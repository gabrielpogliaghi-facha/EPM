// ── FICHA DE ESTUDIANTE ──────────────────────────────────────────────────────────
const FORM_VACIO = {
  nombre:'', apellido:'', dni:'', cuit:'', fecha_nacimiento:'',
  tutor_nombre:'', tutor_dni:'', direccion:'',
  auth_imagen:false, auth_general:false, auth_boleto:false,
};

const AUTORIZACIONES = [
  { campo:'auth_imagen',  label:'Autorización de Imagen',          sub:'Permite usar la imagen del estudiante en comunicaciones institucionales.' },
  { campo:'auth_general', label:'Autorización General',            sub:'Autorización general para actividades y salidas escolares.' },
  { campo:'auth_boleto',  label:'Autorización Boleto Estudiantil', sub:'Solicitud del beneficio de boleto estudiantil de transporte.' },
];

function Ficha({ user, estudianteId, onClose, onGuardarYCargarOtro, onCreado }) {
  const isNew = !estudianteId;
  const [form,         setForm]        = useState(FORM_VACIO);
  const [savedForm,    setSavedForm]   = useState(FORM_VACIO);
  const [loading,      setLoading]     = useState(!isNew);
  const [saving,       setSaving]      = useState(false);
  const [error,        setError]       = useState('');
  // ── Foto
  const [fotoActual,   setFotoActual]  = useState(null);
  const [fotoPend,     setFotoPend]    = useState(null);   // File object pendiente
  const [fotoPreview,  setFotoPreview] = useState(null);   // DataURL local
  const [fotoQuitada,  setFotoQuitada] = useState(false);
  const [tab,          setTab]         = useState('datos');

  const puede = (p) => user.permisos?.includes(p);
  const set = (f, v) => setForm(prev => ({ ...prev, [f]: v }));
  const isDirty = JSON.stringify(form) !== JSON.stringify(savedForm) || !!fotoPend || fotoQuitada;

  useEffect(() => {
    if (!isNew) {
      apiFetch(`/api/estudiantes/${estudianteId}`)
        .then(data => {
          const f = {
            nombre:           data.nombre || '',
            apellido:         data.apellido || '',
            dni:              data.dni || '',
            cuit:             data.cuit || '',
            fecha_nacimiento: data.fecha_nacimiento || '',
            direccion:        data.direccion || '',
            tutor_nombre:     data.tutor_nombre || '',
            tutor_dni:        data.tutor_dni || '',
            auth_imagen:      !!data.auth_imagen,
            auth_general:     !!data.auth_general,
            auth_boleto:      !!data.auth_boleto,
          };
          setForm(f); setSavedForm(f);
          setFotoActual(data.foto_path || null);
        })
        .catch(e => setError(e.message))
        .finally(() => setLoading(false));
    }
  }, []);

  const handleClose = () => {
    if (isDirty && !window.confirm('Hay cambios sin guardar. ¿Salir de todas formas?')) return;
    onClose();
  };

  const onFotoSel = (file) => {
    setFotoPend(file); setFotoQuitada(false);
    const r = new FileReader(); r.onload = e => setFotoPreview(e.target.result); r.readAsDataURL(file);
  };

  const quitarFoto = () => {
    setFotoPend(null); setFotoPreview(null);
    if (fotoActual) setFotoQuitada(true);
    setFotoActual(null);
  };

  const guardar = async (modo) => {
    if (!form.nombre.trim() || !form.apellido.trim() || !form.dni.trim()) {
      setError('Nombre, apellido y DNI son obligatorios.'); return;
    }
    setSaving(true); setError('');
    try {
      const body = {
        ...form,
        auth_imagen:  form.auth_imagen  ? 1 : 0,
        auth_general: form.auth_general ? 1 : 0,
        auth_boleto:  form.auth_boleto  ? 1 : 0,
      };
      let estId = estudianteId;
      if (isNew) { const r = await apiFetch('/api/estudiantes', { method:'POST', body }); estId = r.id; }
      else { await apiFetch(`/api/estudiantes/${estudianteId}`, { method:'PUT', body }); }

      if (fotoQuitada && estId) {
        await fetch(`/api/estudiantes/${estId}/foto`, { method:'DELETE', headers:{ Authorization:`Bearer ${getToken()}` } });
      }
      if (fotoPend && estId) {
        await apiFotoUpload(estId, fotoPend);
      }
      setSavedForm(form); setFotoPend(null); setFotoQuitada(false);
      if (modo === 'otro') { onGuardarYCargarOtro(); }
      else if (isNew && onCreado) { onCreado(estId); }
      else { onClose(); }
    } catch (e) { setError(e.message); }
    finally { setSaving(false); }
  };

  const initials = [form.nombre?.[0], form.apellido?.[0]].filter(Boolean).join('').toUpperCase() || '?';
  const fotoSrc  = fotoPreview || fotoActual;
  const titulo   = isNew ? 'Nueva ficha' : (form.apellido || form.nombre) ? `${form.apellido}, ${form.nombre}` : 'Editando estudiante';

  if (loading) return <div className="spinner"><div className="spin" /></div>;

  return (
    <div className="ficha-wrap">
      {/* ── Header con avatar-foto ── */}
      <div className="ficha-header">
        <button className="btn btn-secondary btn-auto" style={{flexShrink:0}} onClick={handleClose}>← Lista</button>
        <label className="foto-avatar-wrap" title={fotoSrc ? 'Cambiar foto' : 'Agregar foto'}>
          {fotoSrc ? <img src={fotoSrc} alt="foto" /> : initials}
          <input type="file" accept="image/*" hidden onChange={e => e.target.files[0] && onFotoSel(e.target.files[0])} />
        </label>
        <div className="ficha-meta">
          <h2>{titulo}</h2>
          <p>{isNew ? 'Ficha nueva · sin guardar' : `ID ${estudianteId}`}</p>
          {fotoSrc
            ? <button onClick={quitarFoto} style={{background:'none',border:'none',color:'var(--danger)',fontSize:11,cursor:'pointer',padding:0,marginTop:2}}>✕ Quitar foto</button>
            : <span className="foto-hint">📷 Tocá el círculo para agregar foto</span>}
        </div>
      </div>

      {!isNew && puede('ver_legajo_personal') && (
        <div className="ficha-tab-bar">
          <button className={`ficha-tab-btn ${tab==='datos'?'active':''}`} onClick={()=>setTab('datos')}>📋 Datos</button>
          <button className={`ficha-tab-btn ${tab==='legajo'?'active':''}`} onClick={()=>setTab('legajo')}>📁 Legajo personal</button>
        </div>
      )}

      {(isNew || tab === 'datos') && <>
      {isDirty && <div className="dirty-bar"><span>●</span> Cambios sin guardar</div>}
      {error   && <div className="alert alert-error">{error}</div>}

      {/* ── Identidad ── */}
      <div className="ficha-section">
        <div className="ficha-section-title">🪪 Identidad</div>
        <div className="form-grid">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Nombre *</label>
            <input className="form-control" value={form.nombre}
              onChange={e => set('nombre', e.target.value)} placeholder="Juan" />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Apellido *</label>
            <input className="form-control" value={form.apellido}
              onChange={e => set('apellido', e.target.value)} placeholder="García" />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">DNI *</label>
            <input className="form-control" value={form.dni} inputMode="numeric"
              onChange={e => set('dni', e.target.value)} placeholder="12345678" />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">CUIT</label>
            <input className="form-control" value={form.cuit}
              onChange={e => set('cuit', e.target.value)} placeholder="20-12345678-9" />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Fecha de nacimiento</label>
            <input className="form-control" type="date" value={form.fecha_nacimiento}
              onChange={e => set('fecha_nacimiento', e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Dirección</label>
            <input className="form-control" value={form.direccion}
              onChange={e => set('direccion', e.target.value)} placeholder="Av. Ejemplo 1234, Ciudad" />
          </div>
        </div>
      </div>

      {/* ── Familia / Tutor ── */}
      <div className="ficha-section">
        <div className="ficha-section-title">👨‍👩‍👧 Familia / Tutor</div>
        <div className="form-grid">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Nombre del tutor</label>
            <input className="form-control" value={form.tutor_nombre}
              onChange={e => set('tutor_nombre', e.target.value)} placeholder="María García" />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">DNI del tutor</label>
            <input className="form-control" value={form.tutor_dni} inputMode="numeric"
              onChange={e => set('tutor_dni', e.target.value)} placeholder="23456789" />
          </div>
        </div>
      </div>

      {/* ── Inscripciones ── */}
      <div className="ficha-section">
        <div className="ficha-section-title">🎵 Inscripciones (instrumento → nivel)</div>
        {isNew
          ? <p style={{color:'var(--text2)',fontSize:13,margin:0}}>Guardá la ficha primero para agregar inscripciones.</p>
          : <InscripcionesPanel estudianteId={estudianteId} user={user} />
        }
      </div>

      {/* ── Autorizaciones ── */}
      <div className="ficha-section ficha-autorizaciones">
        <div className="ficha-section-title">📋 Autorizaciones</div>
        <div className="auth-list">
          {AUTORIZACIONES.map(({ campo, label, sub }) => (
            <div key={campo} className={`auth-row ${form[campo] ? 'on' : ''}`}
              onClick={() => set(campo, !form[campo])}>
              <div className="auth-check">{form[campo] ? '✓' : ''}</div>
              <div>
                <div className="auth-label">{label}</div>
                <div className="auth-sub">{sub}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Historial de asistencia (solo al editar) ── */}
      {!isNew && (
        <div className="ficha-section">
          <div className="ficha-section-title">📊 Historial de asistencia</div>
          <CalendarioAsistencia estudianteId={estudianteId} />
        </div>
      )}

      {/* ── Footer ── */}
      <div className="ficha-footer">
        <button className="btn btn-secondary btn-auto" onClick={handleClose}>Cancelar</button>
        {(isNew ? puede('crear_estudiantes') : puede('editar_estudiantes')) && (<>
          {isNew && (
            <button className="btn btn-secondary btn-auto" onClick={() => guardar('otro')} disabled={saving}>
              {saving ? 'Guardando…' : '💾 Guardar y cargar otro'}
            </button>
          )}
          {isNew && onCreado && (
            <button className="btn btn-secondary btn-auto" onClick={() => guardar('editar')} disabled={saving}>
              {saving ? 'Guardando…' : '💾 Guardar y agregar inscripciones'}
            </button>
          )}
          <button className="btn btn-primary btn-auto" onClick={() => guardar('cerrar')} disabled={saving}>
            {saving ? 'Guardando…' : '💾 Guardar y cerrar'}
          </button>
        </>)}
      </div>
      </>}

      {!isNew && tab === 'legajo' && puede('ver_legajo_personal') && (
        <LegajoTab estudianteId={estudianteId} user={user} />
      )}
    </div>
  );
}

// ── ESTUDIANTES (contenedor) ──────────────────────────────────────────────────────
function Estudiantes({ user }) {
  const [view,     setView]     = useState('list');
  const [fichaId,  setFichaId]  = useState(null);
  const [fichaKey, setFichaKey] = useState(0);

  const abrirNuevo  = () => { setFichaId(null); setFichaKey(k=>k+1); setView('ficha'); };
  const abrirEditar = (id) => { setFichaId(id); setFichaKey(k=>k+1); setView('ficha'); };
  const cargarOtro  = () => { setFichaId(null); setFichaKey(k=>k+1); };
  const onCreado    = (id) => { setFichaId(id); setFichaKey(k=>k+1); }; // queda en edit mode

  if (view === 'ficha') {
    return (
      <Ficha key={fichaKey} user={user}
        estudianteId={fichaId}
        onClose={() => setView('list')}
        onGuardarYCargarOtro={cargarOtro}
        onCreado={onCreado}
      />
    );
  }
  return <ListaEstudiantes user={user} onNuevo={abrirNuevo} onEditar={abrirEditar} />;
}

// ── HISTORIAL DE ASISTENCIA (sección de Asistencias) ───────────────────────────
function HistorialAsistencia({ user }) {
  const [cursos,      setCursos]      = useState([]);
  const [cursoId,     setCursoId]     = useState('');
  const [estudiantes, setEstudiantes] = useState([]);
  const [estId,       setEstId]       = useState('');
  const [loadingEst,  setLoadingEst]  = useState(false);

  useEffect(() => {
    apiFetch('/api/cursos/mis-cursos')
      .then(cs => { setCursos(cs); if (cs.length===1) setCursoId(String(cs[0].id)); })
      .catch(()=>{});
  }, []);

  useEffect(() => {
    if (!cursoId) { setEstudiantes([]); setEstId(''); return; }
    setLoadingEst(true);
    apiFetch(`/api/estudiantes?curso_id=${cursoId}`)
      .then(es => { setEstudiantes(es); setEstId(es.length>0?String(es[0].id):''); })
      .catch(()=>{})
      .finally(()=>setLoadingEst(false));
  }, [cursoId]);

  const estActual = estudiantes.find(e=>String(e.id)===estId);

  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title" style={{marginBottom:12}}>📊 Historial de asistencia</div>
        <div className="form-grid">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Curso</label>
            <select className="form-control" value={cursoId} onChange={e=>{setCursoId(e.target.value);setEstId('');}}>
              <option value="">-- Seleccionar --</option>
              {cursos.map(c=><option key={c.id} value={String(c.id)}>{c.nombre}</option>)}
            </select>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Estudiante</label>
            <select className="form-control" value={estId} onChange={e=>setEstId(e.target.value)}
              disabled={!cursoId||loadingEst}>
              <option value="">-- Seleccionar --</option>
              {estudiantes.map(e=><option key={e.id} value={String(e.id)}>{e.apellido}, {e.nombre}</option>)}
            </select>
          </div>
        </div>
      </div>

      {estId ? (
        <div className="card">
          <div className="card-title" style={{marginBottom:12}}>
            {estActual && `${estActual.apellido}, ${estActual.nombre}`}
          </div>
          <CalendarioAsistencia estudianteId={Number(estId)} />
        </div>
      ) : cursoId ? (
        <div className="empty-state">
          <div className="empty-state-icon">📊</div>
          <p>Seleccioná un estudiante para ver su historial.</p>
        </div>
      ) : null}
    </div>
  );
}

// ── TOMAR ASISTENCIA ────────────────────────────────────────────────────────────
function TomarAsistencia({ user }) {
  const hoy = (() => {
    const d = new Date();
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  })();

  const [cursos,      setCursos]      = useState([]);
  const [cursoId,     setCursoId]     = useState('');
  const [fecha,       setFecha]       = useState(hoy);
  const [estudiantes, setEstudiantes] = useState([]);
  const [asis,        setAsis]        = useState({});  // { id: { estado, observacion } }
  const [existente,   setExistente]   = useState(false);
  const [loading,     setLoading]     = useState(false);
  const [saving,      setSaving]      = useState(false);
  const [saved,       setSaved]       = useState(false);
  const [error,       setError]       = useState('');

  const puede = (p) => user.permisos?.includes(p);

  useEffect(() => {
    apiFetch('/api/cursos/mis-cursos')
      .then(cs => {
        setCursos(cs);
        if (cs.length === 1) setCursoId(String(cs[0].id));
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    if (!cursoId || !fecha) return;
    setSaved(false); setError('');
    const load = async () => {
      setLoading(true);
      try {
        const [ests, existentes] = await Promise.all([
          apiFetch(`/api/estudiantes?curso_id=${cursoId}`),
          apiFetch(`/api/asistencias?curso_id=${cursoId}&fecha=${fecha}`),
        ]);
        setEstudiantes(ests);
        const map = {};
        existentes.forEach(a => { map[a.estudiante_id] = { estado: a.estado, observacion: a.observacion || '' }; });
        const init = {};
        ests.forEach(e => { init[e.id] = map[e.id] || { estado: '', observacion: '' }; });
        setAsis(init);
        setExistente(existentes.length > 0);
      } catch (e) { setError(e.message); }
      finally { setLoading(false); }
    };
    load();
  }, [cursoId, fecha]);

  const setEst = (id, estado) => setAsis(prev => ({ ...prev, [id]: { ...prev[id], estado } }));
  const setObs = (id, obs)    => setAsis(prev => ({ ...prev, [id]: { ...prev[id], observacion: obs } }));
  const marcarTodos = (estado) => {
    const next = {};
    estudiantes.forEach(e => { next[e.id] = { ...asis[e.id], estado }; });
    setAsis(next);
  };

  const guardar = async () => {
    const items = estudiantes
      .filter(e => asis[e.id]?.estado)
      .map(e => ({ estudiante_id: e.id, estado: asis[e.id].estado, observacion: asis[e.id].observacion || '' }));

    if (items.length === 0) { setError('Seleccioná el estado de al menos un estudiante.'); return; }

    const sinMarcar = estudiantes.filter(e => !asis[e.id]?.estado).length;
    if (sinMarcar > 0 && !window.confirm(`Quedan ${sinMarcar} estudiante(s) sin marcar. ¿Guardar igual?`)) return;

    setSaving(true); setError('');
    try {
      await apiFetch('/api/asistencias/bulk', {
        method: 'POST',
        body: { curso_id: Number(cursoId), fecha, asistencias: items }
      });
      setSaved(true); setExistente(true);
    } catch (e) { setError(e.message); }
    finally { setSaving(false); }
  };

  const stats = { presente: 0, ausente: 0, tarde: 0, sin: 0 };
  estudiantes.forEach(e => {
    const est = asis[e.id]?.estado;
    if      (est === 'presente') stats.presente++;
    else if (est === 'ausente')  stats.ausente++;
    else if (est === 'tarde')    stats.tarde++;
    else                         stats.sin++;
  });

  const cursoNombre = cursos.find(c => String(c.id) === cursoId)?.nombre || '';
  const fechaStr = fecha
    ? new Date(fecha + 'T12:00').toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' })
    : '';

  return (
    <div>
      {/* ── Selector de curso y fecha ── */}
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title" style={{marginBottom:12}}>📋 Tomar Asistencia</div>
        <div className="form-grid">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Curso</label>
            <select className="form-control" value={cursoId} onChange={e => setCursoId(e.target.value)}>
              <option value="">-- Seleccionar --</option>
              {cursos.map(c => <option key={c.id} value={String(c.id)}>{c.nombre}</option>)}
            </select>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Fecha</label>
            <input className="form-control" type="date" value={fecha}
              onChange={e => setFecha(e.target.value)} />
          </div>
        </div>
        {cursoId && fecha && !loading && (
          <p style={{fontSize:12, color:'var(--text2)', marginTop:8}}>
            {cursoNombre} · {fechaStr}
          </p>
        )}
        {!puede('cargar_asistencias') && cursos.length === 0 && (
          <p style={{fontSize:13, color:'var(--text2)', marginTop:10}}>
            No tenés cursos asignados. Pedile a un administrador que te asigne cursos.
          </p>
        )}
      </div>

      {error && <div className="alert alert-error" onClick={() => setError('')} style={{cursor:'pointer'}}>{error}</div>}

      {!cursoId ? null : loading ? (
        <div className="spinner"><div className="spin" /></div>
      ) : saved ? (
        <div className="asis-success">
          <div style={{fontSize:56, marginBottom:8}}>✅</div>
          <h3>¡Asistencia guardada!</h3>
          <p style={{marginTop:6, opacity:.9}}>{cursoNombre} · {fechaStr}</p>
          <p style={{marginTop:4, opacity:.85, fontSize:13}}>
            {stats.presente} presentes · {stats.ausente} ausentes · {stats.tarde} tardes
          </p>
          <button className="btn btn-secondary btn-auto" style={{marginTop:20}}
            onClick={() => setSaved(false)}>
            ← Seguir editando
          </button>
        </div>
      ) : (
        <>
          {existente && (
            <div className="alert alert-warning">
              ✏️ Ya existe asistencia para este día. Editándola.
            </div>
          )}

          {estudiantes.length > 0 && (
            <div className="asis-counter">
              <span style={{color:'var(--success)'}}>✅ {stats.presente}</span>
              <span style={{color:'var(--danger)'}}>❌ {stats.ausente}</span>
              <span style={{color:'#3b82f6'}}>⏰ {stats.tarde}</span>
              {stats.sin > 0 && <span style={{color:'var(--text2)'}}>○ {stats.sin} sin marcar</span>}
              <button style={{marginLeft:'auto', background:'none', border:'none',
                color:'var(--primary)', fontWeight:700, fontSize:12, cursor:'pointer', padding:0}}
                onClick={() => marcarTodos('presente')}>
                Todos presentes →
              </button>
            </div>
          )}

          {estudiantes.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">👥</div>
              <p>No hay estudiantes en este curso.</p>
            </div>
          ) : (
            <>
              {estudiantes.map(e => {
                const a = asis[e.id] || { estado: '', observacion: '' };
                const instrLabel = (e.inscripciones||[])
                  .map(i=>i.instrumento_nombre).join(' / ');
                return (
                  <div key={e.id} className={`asis-row ${a.estado ? 'asis-row-'+a.estado : ''}`}>
                    <div className="asis-nombre">
                      {e.apellido}, {e.nombre}
                      {instrLabel && <span style={{fontSize:11,color:'var(--text2)',marginLeft:6}}>· {instrLabel}</span>}
                    </div>
                    <div className="asis-btns">
                      <button className={`asis-btn asis-presente ${a.estado==='presente'?'sel':''}`}
                        onClick={() => setEst(e.id, 'presente')}>✅ Presente</button>
                      <button className={`asis-btn asis-ausente ${a.estado==='ausente'?'sel':''}`}
                        onClick={() => setEst(e.id, 'ausente')}>❌ Ausente</button>
                      <button className={`asis-btn asis-tarde ${a.estado==='tarde'?'sel':''}`}
                        onClick={() => setEst(e.id, 'tarde')}>⏰ Tarde</button>
                    </div>
                    {(a.estado === 'ausente' || a.estado === 'tarde' || a.observacion) && (
                      <input className="asis-obs" placeholder="Observación opcional…"
                        value={a.observacion}
                        onChange={ev => setObs(e.id, ev.target.value)} />
                    )}
                  </div>
                );
              })}

              {puede('cargar_asistencias') && (
                <button className="btn btn-primary" style={{marginTop:16, padding:'16px', fontSize:15}}
                  onClick={guardar} disabled={saving}>
                  {saving ? 'Guardando…' : `💾 Guardar asistencia · ${cursoNombre}`}
                </button>
              )}
            </>
          )}
        </>
      )}
    </div>
  );
}

// ── GRÁFICO DE TORTA (SVG nativo, sin dependencias externas) ────────────────────
// Colores: verde=Presente, rojo=Ausente, amarillo=Tarde
// FUTURO: cuando se implemente asistencia por materia (UNSAM), reutilizar este
// componente pasando los totales por materia: <PieChart presencias={} ausencias={} tardes={} />
function PieChart({ presencias, ausencias, tardes, size = 80 }) {
  const data = [
    { v: presencias, color: '#22c55e' },
    { v: ausencias,  color: '#ef4444' },
    { v: tardes,     color: '#f59e0b' },
  ];
  const total = data.reduce((s, d) => s + d.v, 0);
  const cx = size / 2, cy = size / 2, r = size / 2 - 2;

  if (total === 0) {
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block',flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="var(--bg3)" stroke="var(--border)" strokeWidth={1.5} />
        <text x={cx} y={cy} textAnchor="middle" dy="0.35em" fontSize={Math.round(size*0.2)} fill="var(--text2)">—</text>
      </svg>
    );
  }

  const activos = data.filter(d => d.v > 0);
  // Caso especial: un solo segmento → círculo completo
  if (activos.length === 1) {
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block',flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill={activos[0].color} />
      </svg>
    );
  }

  let angle = -Math.PI / 2;
  const paths = activos.map(d => {
    const sweep = (d.v / total) * 2 * Math.PI;
    const ea = angle + sweep;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(ea),    y2 = cy + r * Math.sin(ea);
    const la = sweep > Math.PI ? 1 : 0;
    const path = `M${cx},${cy}L${x1.toFixed(3)},${y1.toFixed(3)}A${r},${r},0,${la},1,${x2.toFixed(3)},${y2.toFixed(3)}Z`;
    angle = ea;
    return { path, color: d.color };
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block',flexShrink:0}}>
      {paths.map((p, i) => (
        <path key={i} d={p.path} fill={p.color} stroke="#fff" strokeWidth={1.5} />
      ))}
    </svg>
  );
}

// ── REPORTES DE ASISTENCIA ───────────────────────────────────────────────────────
function Reportes({ user }) {
  const [ciclos,     setCiclos]     = useState([]);
  const [cursos,     setCursos]     = useState([]);
  const [modo,       setModo]       = useState('semestre');
  const [semActivo,  setSemActivo]  = useState(null);
  const [fechaIni,   setFechaIni]   = useState('');
  const [fechaFin,   setFechaFin]   = useState('');
  const [cursoId,    setCursoId]    = useState('');
  const [reporte,    setReporte]    = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [sortCol,    setSortCol]    = useState('apellido');
  const [sortDir,    setSortDir]    = useState('asc');
  const [editSem,    setEditSem]    = useState(null);
  const [editForm,   setEditForm]   = useState({ fecha_inicio:'', fecha_fin:'' });
  const [editSaving, setEditSaving] = useState(false);
  const [error,      setError]      = useState('');
  const [toast,      setToast]      = useState({ type:'', text:'' });

  const puede = (p) => user.permisos?.includes(p);
  const showToast = (type, text) => { setToast({type,text}); setTimeout(()=>setToast({type:'',text:''}),4000); };

  useEffect(() => {
    Promise.all([apiFetch('/api/cursos'), apiFetch('/api/periodos/ciclos')])
      .then(([cs, cl]) => {
        setCursos(cs); setCiclos(cl);
        const sem1 = cl[0]?.semestres?.find(s => s.numero === 1);
        if (sem1) { setSemActivo(sem1); setFechaIni(sem1.fecha_inicio); setFechaFin(sem1.fecha_fin); }
      }).catch(() => {});
  }, []);

  const selSemestre = (sem) => {
    setSemActivo(sem); setFechaIni(sem.fecha_inicio); setFechaFin(sem.fecha_fin);
    setModo('semestre'); setReporte(null);
  };

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };

  const cargarReporte = async () => {
    if (!fechaIni || !fechaFin) { setError('Seleccioná un semestre o ingresá un rango de fechas.'); return; }
    setLoading(true); setError('');
    try {
      const p = new URLSearchParams({ fecha_inicio: fechaIni, fecha_fin: fechaFin });
      if (cursoId) p.set('curso_id', cursoId);
      setReporte(await apiFetch(`/api/reportes/asistencia?${p}`));
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const guardarSemestre = async () => {
    setEditSaving(true);
    try {
      await apiFetch(`/api/periodos/semestres/${editSem.id}`, { method:'PUT', body: editForm });
      const cl = await apiFetch('/api/periodos/ciclos');
      setCiclos(cl);
      if (semActivo?.id === editSem.id) {
        setFechaIni(editForm.fecha_inicio); setFechaFin(editForm.fecha_fin);
        setSemActivo(s => ({...s, ...editForm}));
      }
      setEditSem(null); showToast('success', 'Fechas del semestre actualizadas.'); setReporte(null);
    } catch(e) { showToast('error', e.message); }
    finally { setEditSaving(false); }
  };

  const est = reporte?.estudiantes || [];
  const sorted = [...est].sort((a, b) => {
    let av = sortCol==='apellido' ? `${a.apellido} ${a.nombre}` : a[sortCol];
    let bv = sortCol==='apellido' ? `${b.apellido} ${b.nombre}` : b[sortCol];
    if (sortCol==='porcentaje') { av = av??-1; bv = bv??-1; }
    if (typeof av==='string') return sortDir==='asc' ? av.localeCompare(bv,'es') : bv.localeCompare(av,'es');
    return sortDir==='asc' ? (av??0)-(bv??0) : (bv??0)-(av??0);
  });

  const conDatos = est.filter(e=>e.total_registros>0);
  const promedio = conDatos.length
    ? Math.round(conDatos.reduce((s,e)=>s+(e.porcentaje??0),0)/conDatos.length)
    : null;
  const alerta3   = est.filter(e=>e.ausencias>=3).length;
  const totalPres = est.reduce((s,e) => s+e.presencias, 0);
  const totalAus  = est.reduce((s,e) => s+e.ausencias,  0);
  const totalTard = est.reduce((s,e) => s+e.tardes,     0);
  const totalReg  = totalPres + totalAus + totalTard;
  const allSems   = ciclos.flatMap(c=>c.semestres||[]);

  const periodoLabel = modo==='semestre'&&semActivo
    ? `${ciclos.find(c=>c.semestres?.some(s=>s.id===semActivo.id))?.nombre||''} · ${semActivo.nombre}`
    : (fechaIni&&fechaFin ? `${fechaIni} al ${fechaFin}` : '');
  const cursoLabel = cursoId ? (cursos.find(c=>String(c.id)===cursoId)?.nombre||'') : 'Todos los cursos';

  const exportarCSV = () => {
    if (!sorted.length) return;
    const heads = ['Apellido','Nombre','Curso','Presencias','Ausencias','Tardes','Días','% Asistencia'];
    const rows  = sorted.map(e=>[
      e.apellido, e.nombre, e.curso_nombre||'',
      e.presencias, e.ausencias, e.tardes, e.total_registros,
      e.porcentaje!==null ? e.porcentaje+'%' : 'Sin datos',
    ]);
    const csv  = [heads,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `EPM_asistencia_${fechaIni}_${fechaFin}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const SortTh = ({col, label}) => (
    <th className="rpt-th" onClick={()=>toggleSort(col)}>
      {label}{sortCol===col && <span style={{marginLeft:4,fontSize:10}}>{sortDir==='asc'?'▲':'▼'}</span>}
    </th>
  );
  const PctBadge = ({pct}) => {
    if (pct===null) return <span style={{color:'var(--text2)',fontSize:12}}>—</span>;
    return <span className={`pct-badge ${pct>=90?'pct-alta':pct>=75?'pct-media':'pct-baja'}`}>{pct}%</span>;
  };

  return (
    <div>
      {toast.text && <div className={`alert alert-${toast.type} no-print`} style={{cursor:'pointer'}} onClick={()=>setToast({type:'',text:''})}>{toast.text}</div>}

      {/* ── Panel de control ── */}
      <div className="card no-print" style={{marginBottom:14}}>
        <div className="card-title" style={{marginBottom:12}}>📊 Reporte de Asistencia</div>

        <div style={{marginBottom:14}}>
          <div className="form-label">Período</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            {allSems.map(s => (
              <button key={s.id}
                className={`curso-tab ${semActivo?.id===s.id&&modo==='semestre'?'active':''}`}
                style={{display:'flex',alignItems:'center',gap:6}}
                onClick={() => selSemestre(s)}>
                <span>{s.nombre}</span>
                <span style={{fontSize:10,opacity:.65}}>{s.fecha_inicio} → {s.fecha_fin}</span>
                {puede('editar_reportes') && (
                  <span style={{fontSize:12}} title="Editar fechas"
                    onClick={e=>{e.stopPropagation();setEditSem(s);setEditForm({fecha_inicio:s.fecha_inicio,fecha_fin:s.fecha_fin});}}>
                    ✏️
                  </span>
                )}
              </button>
            ))}
            <button className={`curso-tab ${modo==='rango'?'active':''}`}
              onClick={()=>{setModo('rango');setSemActivo(null);setReporte(null);}}>
              Rango personalizado
            </button>
          </div>
          {modo==='rango' && (
            <div className="form-grid">
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Desde</label>
                <input className="form-control" type="date" value={fechaIni}
                  onChange={e=>{setFechaIni(e.target.value);setReporte(null);}} />
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Hasta</label>
                <input className="form-control" type="date" value={fechaFin}
                  onChange={e=>{setFechaFin(e.target.value);setReporte(null);}} />
              </div>
            </div>
          )}
        </div>

        <div className="form-group" style={{marginBottom:12}}>
          <label className="form-label">Curso</label>
          <select className="form-control" value={cursoId}
            onChange={e=>{setCursoId(e.target.value);setReporte(null);}}>
            <option value="">Todos los cursos</option>
            {cursos.map(c=><option key={c.id} value={String(c.id)}>{c.nombre}</option>)}
          </select>
        </div>

        {error && <div className="alert alert-error">{error}</div>}
        <button className="btn btn-primary" onClick={cargarReporte} disabled={loading}>
          {loading ? 'Generando…' : '📊 Generar reporte'}
        </button>
      </div>

      {loading && <div className="spinner"><div className="spin" /></div>}

      {reporte && !loading && (
        <>
          {/* Header visible solo al imprimir */}
          <div className="print-header">
            <h2 style={{fontSize:18,fontWeight:800,marginBottom:4}}>EPM – Reporte de Asistencia</h2>
            <p style={{fontSize:12,color:'#666'}}>{periodoLabel} · {cursoLabel} · {new Date().toLocaleDateString('es-AR')}</p>
            {reporte.dias_registrados>0 && <p style={{fontSize:12,color:'#666'}}>Días de clase registrados: {reporte.dias_registrados}</p>}
          </div>

          {/* Stats */}
          <div className="report-stats no-print">
            <div className="rstat">
              <div className="rstat-value">{est.length}</div>
              <div className="rstat-label">Estudiantes</div>
            </div>
            <div className="rstat">
              <div className="rstat-value">{reporte.dias_registrados}</div>
              <div className="rstat-label">Días registrados</div>
            </div>
            <div className={`rstat ${promedio!==null&&promedio<75?'rstat-danger':promedio!==null&&promedio<90?'rstat-alert':''}`}>
              <div className="rstat-value">{promedio!==null?promedio+'%':'—'}</div>
              <div className="rstat-label">Promedio asistencia</div>
            </div>
            <div className={`rstat ${alerta3>0?'rstat-alert':''}`}>
              <div className="rstat-value">{alerta3}</div>
              <div className="rstat-label">Con 3+ ausencias ⚠️</div>
            </div>
          </div>

          {/* Torta general del curso */}
          {totalReg > 0 && (
            <div className="card no-print pie-wrap" style={{marginBottom:14,padding:'16px 20px'}}>
              <PieChart presencias={totalPres} ausencias={totalAus} tardes={totalTard} size={110} />
              <div>
                <div className="form-label" style={{marginBottom:10}}>
                  Distribución total del período · {sorted.length} estudiantes
                </div>
                <div className="pie-legend">
                  <span style={{color:'#22c55e',fontSize:18,lineHeight:1}}>●</span>
                  Presencias: <strong>{totalPres}</strong>
                  <span style={{color:'var(--text2)',fontSize:12}}>({Math.round(totalPres/totalReg*100)}%)</span>
                </div>
                <div className="pie-legend">
                  <span style={{color:'#ef4444',fontSize:18,lineHeight:1}}>●</span>
                  Ausencias: <strong>{totalAus}</strong>
                  <span style={{color:'var(--text2)',fontSize:12}}>({Math.round(totalAus/totalReg*100)}%)</span>
                </div>
                <div className="pie-legend">
                  <span style={{color:'#f59e0b',fontSize:18,lineHeight:1}}>●</span>
                  Tardes: <strong>{totalTard}</strong>
                  <span style={{color:'var(--text2)',fontSize:12}}>({Math.round(totalTard/totalReg*100)}%)</span>
                </div>
              </div>
            </div>
          )}

          {/* Acciones */}
          <div className="no-print" style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
            <button className="btn btn-secondary btn-auto" onClick={exportarCSV}>📤 Exportar CSV</button>
            <button className="btn btn-secondary btn-auto" onClick={()=>window.print()}>🖨️ Imprimir</button>
            <span style={{fontSize:12,color:'var(--text2)'}}>
              {sorted.length} est. · {periodoLabel} · {cursoLabel}
            </span>
          </div>

          {/* Tabla */}
          {sorted.length===0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">📊</div>
              <p>No hay estudiantes para mostrar con esos filtros.</p>
            </div>
          ) : (
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <div style={{overflowX:'auto'}}>
                <table className="rpt-table">
                  <thead>
                    <tr>
                      <SortTh col="apellido"        label="Estudiante" />
                      {!cursoId && <SortTh col="curso_nombre" label="Curso" />}
                      <SortTh col="presencias"      label="✅ Pres." />
                      <SortTh col="ausencias"       label="❌ Aus." />
                      <SortTh col="tardes"          label="⏰ Tarde" />
                      <SortTh col="total_registros" label="Días" />
                      <SortTh col="porcentaje"      label="% Asist." />
                      <th className="rpt-th" style={{textAlign:'center'}}>Dist.</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.map(e => (
                      <tr key={e.id} className={e.ausencias>=3?'rpt-row-alerta':''}>
                        <td className="rpt-nombre">
                          {e.apellido}, {e.nombre}
                          {e.total_registros===0 && <span className="rpt-sin-datos">sin datos</span>}
                        </td>
                        {!cursoId && <td className="rpt-td">{e.curso_nombre||'—'}</td>}
                        <td className="rpt-td rpt-num">{e.presencias}</td>
                        <td className={`rpt-td rpt-num ${e.ausencias>=3?'rpt-aus-alta':e.ausencias>0?'rpt-aus-media':''}`}>
                          {e.ausencias}
                        </td>
                        <td className="rpt-td rpt-num">{e.tardes}</td>
                        <td className="rpt-td rpt-num">{e.total_registros}</td>
                        <td className="rpt-td"><PctBadge pct={e.porcentaje} /></td>
                        <td className="rpt-td" style={{padding:'4px 8px',textAlign:'center'}}>
                          <PieChart presencias={e.presencias} ausencias={e.ausencias} tardes={e.tardes} size={44} />
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}

      {/* Modal editar semestre */}
      {editSem && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditSem(null)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">✏️ Editar fechas: {editSem.nombre}</span>
              <button className="modal-close" onClick={()=>setEditSem(null)}>✕</button>
            </div>
            <div className="form-grid">
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Fecha de inicio</label>
                <input className="form-control" type="date" value={editForm.fecha_inicio}
                  onChange={e=>setEditForm(f=>({...f,fecha_inicio:e.target.value}))} />
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Fecha de fin</label>
                <input className="form-control" type="date" value={editForm.fecha_fin}
                  onChange={e=>setEditForm(f=>({...f,fecha_fin:e.target.value}))} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={()=>setEditSem(null)}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={guardarSemestre} disabled={editSaving}>
                {editSaving?'Guardando…':'Guardar fechas'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── GESTIÓN DE USUARIOS ─────────────────────────────────────────────────────────
function GestionUsuarios({ self }) {
  const [usuarios,setUsuarios]= useState([]);
  const [cursos,  setCursos]  = useState([]);
  const [roles,   setRoles]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal,   setModal]   = useState(null); // null|'form'|'password'|'delete'
  const [target,  setTarget]  = useState(null);
  const [form,    setForm]    = useState({ nombre:'', email:'', password:'', rol_id:'', cursos:[] });
  const [pwForm,  setPwForm]  = useState({ password:'', confirm:'' });
  const [saving,  setSaving]  = useState(false);
  const [formErr, setFormErr] = useState('');
  const [toast,   setToast]   = useState({ type:'', text:'' });

  const showToast = (t,m) => { setToast({type:t,text:m}); setTimeout(()=>setToast({type:'',text:''}),4000); };
  const ini = n => n.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const isNew = !target;

  const cargar = async () => {
    setLoading(true);
    try {
      const [us,cs,rs] = await Promise.all([
        apiFetch('/api/usuarios'), apiFetch('/api/cursos'), apiFetch('/api/roles')
      ]);
      setUsuarios(us); setCursos(cs); setRoles(rs);
    } catch(e) { showToast('error', e.message); }
    finally { setLoading(false); }
  };
  useEffect(() => { cargar(); }, []);

  const abrirNuevo = () => {
    setTarget(null);
    setForm({ nombre:'', email:'', password:'', rol_id: String(roles[0]?.id||''), cursos:[] });
    setFormErr(''); setModal('form');
  };
  const abrirEditar = u => {
    setTarget(u);
    setForm({ nombre:u.nombre, email:u.email, password:'', rol_id:String(u.rol_id), cursos:(u.cursos||[]).map(c=>c.id) });
    setFormErr(''); setModal('form');
  };
  const abrirPassword = u => { setTarget(u); setPwForm({password:'',confirm:''}); setFormErr(''); setModal('password'); };
  const abrirDelete   = u => { setTarget(u); setModal('delete'); };
  const cerrar = () => setModal(null);

  const toggleCurso = id => setForm(f => ({
    ...f, cursos: f.cursos.includes(id) ? f.cursos.filter(c=>c!==id) : [...f.cursos, id]
  }));

  const guardarUsuario = async () => {
    if (!form.nombre.trim()||!form.email.trim()||!form.rol_id) { setFormErr('Nombre, email y rol son requeridos.'); return; }
    if (isNew && !form.password) { setFormErr('Contraseña requerida.'); return; }
    if (isNew && form.password.length<6) { setFormErr('Contraseña: mínimo 6 caracteres.'); return; }
    setSaving(true); setFormErr('');
    try {
      let uid;
      if (isNew) {
        const r = await apiFetch('/api/usuarios', { method:'POST', body:{ nombre:form.nombre, email:form.email, password:form.password, rol_id:Number(form.rol_id) } });
        uid = r.id;
      } else {
        await apiFetch(`/api/usuarios/${target.id}`, { method:'PUT', body:{ nombre:form.nombre, email:form.email, rol_id:Number(form.rol_id) } });
        uid = target.id;
      }
      await apiFetch(`/api/usuarios/${uid}/cursos`, { method:'PUT', body:{ cursos: form.cursos } });
      showToast('success', isNew ? `Usuario "${form.nombre}" creado.` : `"${form.nombre}" actualizado.`);
      cerrar(); cargar();
    } catch(e) { setFormErr(e.message); }
    finally { setSaving(false); }
  };

  const cambiarPassword = async () => {
    if (!pwForm.password || pwForm.password.length<6) { setFormErr('Mínimo 6 caracteres.'); return; }
    if (pwForm.password!==pwForm.confirm) { setFormErr('Las contraseñas no coinciden.'); return; }
    setSaving(true); setFormErr('');
    try {
      await apiFetch(`/api/usuarios/${target.id}/password`, { method:'PUT', body:{ password:pwForm.password } });
      showToast('success', 'Contraseña actualizada.'); cerrar();
    } catch(e) { setFormErr(e.message); }
    finally { setSaving(false); }
  };

  const eliminarUsuario = async () => {
    setSaving(true);
    try {
      await apiFetch(`/api/usuarios/${target.id}`, { method:'DELETE' });
      showToast('success', `"${target.nombre}" dado de baja.`); cerrar(); cargar();
    } catch(e) { showToast('error', e.message); cerrar(); }
    finally { setSaving(false); }
  };

  return (
    <div>
      {toast.text && <div className={`alert alert-${toast.type}`} style={{cursor:'pointer'}} onClick={()=>setToast({type:'',text:''})}>{toast.text}</div>}
      <div className="card">
        <div className="section-header">
          <span className="card-title" style={{marginBottom:0}}>👤 Usuarios</span>
          <button className="btn btn-primary btn-auto" onClick={abrirNuevo}>＋ Nuevo usuario</button>
        </div>
        {loading ? <div className="spinner"><div className="spin"/></div>
        : usuarios.length===0 ? <div className="empty-state"><div className="empty-state-icon">👤</div><p>Sin usuarios.</p></div>
        : usuarios.map(u => (
          <div key={u.id} className="usr-row">
            <div className="usr-avatar">{ini(u.nombre)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="usr-nombre">
                {u.nombre}{u.id===self.id && <span className="usr-self">yo</span>}
              </div>
              <div className="usr-meta">
                {u.email} · <span className="rol-badge">{u.rol_nombre}</span>
                {u.cursos?.length>0 && <span style={{marginLeft:4}}>{u.cursos.length} curso(s)</span>}
              </div>
            </div>
            <div className="row-actions">
              <button className="btn-icon" onClick={()=>abrirEditar(u)} title="Editar">✏️</button>
              <button className="btn-icon" onClick={()=>abrirPassword(u)} title="Contraseña">🔑</button>
              <button className="btn-icon btn-icon-danger" onClick={()=>abrirDelete(u)}
                disabled={u.id===self.id} style={{opacity:u.id===self.id?.35:1}}
                title={u.id===self.id?'No podés darte de baja a vos mismo':'Dar de baja'}>🗑️</button>
            </div>
          </div>
        ))}
      </div>

      {/* Modal form usuario */}
      {modal==='form' && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&cerrar()}>
          <div className="modal" style={{maxWidth:520}}>
            <div className="modal-header">
              <span className="modal-title">{isNew?'Nuevo usuario':'Editar usuario'}</span>
              <button className="modal-close" onClick={cerrar}>✕</button>
            </div>
            {formErr && <div className="alert alert-error">{formErr}</div>}
            <div className="form-group">
              <label className="form-label">Nombre *</label>
              <input className="form-control" value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} placeholder="Ana González" />
            </div>
            <div className="form-group">
              <label className="form-label">Email *</label>
              <input className="form-control" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="ana@epm.edu.ar" />
            </div>
            {isNew && (
              <div className="form-group">
                <label className="form-label">Contraseña * (mín. 6 caracteres)</label>
                <input className="form-control" type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="••••••" />
              </div>
            )}
            <div className="form-group">
              <label className="form-label">Rol *</label>
              <select className="form-control" value={form.rol_id} onChange={e=>setForm(f=>({...f,rol_id:e.target.value}))}>
                <option value="">Seleccionar…</option>
                {roles.map(r=><option key={r.id} value={String(r.id)}>{r.nombre}</option>)}
              </select>
            </div>
            {cursos.length>0 && (
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Cursos asignados (visibles en Tomar Asistencia)</label>
                <div className="auth-list">
                  {cursos.map(c => {
                    const on = form.cursos.includes(c.id);
                    return (
                      <div key={c.id} className={`auth-row ${on?'on':''}`} onClick={()=>toggleCurso(c.id)} style={{padding:'10px 14px'}}>
                        <div className={`auth-check ${on?'on':''}`}>{on?'✓':''}</div>
                        <div className="auth-label" style={{fontSize:14}}>{c.nombre}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrar}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={guardarUsuario} disabled={saving}>
                {saving?'Guardando…':isNew?'Crear usuario':'Guardar cambios'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal contraseña */}
      {modal==='password' && target && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&cerrar()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">🔑 Cambiar contraseña</span>
              <button className="modal-close" onClick={cerrar}>✕</button>
            </div>
            <p style={{marginBottom:12,fontSize:13}}>Usuario: <strong>{target.nombre}</strong></p>
            {formErr && <div className="alert alert-error">{formErr}</div>}
            <div className="form-group">
              <label className="form-label">Nueva contraseña (mín. 6 caracteres)</label>
              <input className="form-control" type="password" value={pwForm.password} onChange={e=>setPwForm(f=>({...f,password:e.target.value}))} placeholder="••••••" />
            </div>
            <div className="form-group">
              <label className="form-label">Confirmar contraseña</label>
              <input className="form-control" type="password" value={pwForm.confirm} onChange={e=>setPwForm(f=>({...f,confirm:e.target.value}))} placeholder="••••••" />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrar}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={cambiarPassword} disabled={saving}>
                {saving?'Guardando…':'Cambiar contraseña'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal confirmar baja */}
      {modal==='delete' && target && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&cerrar()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">⚠️ Dar de baja al usuario</span>
              <button className="modal-close" onClick={cerrar}>✕</button>
            </div>
            <p style={{marginBottom:12}}>Usuario: <strong>{target.nombre}</strong></p>
            <div className="alert alert-warning">
              Esto va a generar el siguiente cambio: <strong>{target.nombre}</strong> quedará inactivo y
              no podrá acceder al sistema. Sus registros (asistencias cargadas, etc.) se conservan intactos.
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrar}>Cancelar</button>
              <button className="btn btn-danger btn-auto" onClick={eliminarUsuario} disabled={saving}>
                {saving?'Procesando…':'Confirmar baja'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── GESTIÓN DE ROLES Y PERMISOS ──────────────────────────────────────────────────
const GRUPOS_PERM = [
  { key:'estudiantes',    label:'👥 Estudiantes' },
  { key:'asistencias',   label:'📋 Asistencias' },
  { key:'reportes',      label:'📊 Reportes' },
  { key:'planificaciones',label:'📝 Planificaciones' },
  { key:'administracion',label:'⚙️ Administración' },
];

function GestionRoles() {
  const [roles,    setRoles]    = useState([]);
  const [permisos, setPermisos] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [expanded, setExpanded] = useState(null);
  const [pending,  setPending]  = useState({});   // { rolId: Set<codigo> }
  const [confirm,  setConfirm]  = useState(null); // { rol, codes }
  const [saving,   setSaving]   = useState(false);
  const [modalNuevo, setModalNuevo] = useState(false);
  const [nuevoForm,  setNuevoForm]  = useState({ nombre:'', descripcion:'' });
  const [delConfirm, setDelConfirm] = useState(null);
  const [toast,    setToast]    = useState({ type:'', text:'' });

  const showToast = (t,m) => { setToast({type:t,text:m}); setTimeout(()=>setToast({type:'',text:''}),4000); };

  const cargar = async () => {
    setLoading(true);
    try {
      const [rs,ps] = await Promise.all([apiFetch('/api/roles'), apiFetch('/api/roles/permisos')]);
      setRoles(rs); setPermisos(ps);
    } catch(e) { showToast('error', e.message); }
    finally { setLoading(false); }
  };
  useEffect(() => { cargar(); }, []);

  const toggleExpand = rolId => {
    setExpanded(e => e===rolId ? null : rolId);
    if (!pending[rolId]) {
      const rol = roles.find(r=>r.id===rolId);
      if (rol) setPending(p => ({...p, [rolId]: new Set(rol.permisos)}));
    }
  };

  const togglePerm = (rolId, codigo) => {
    setPending(p => {
      const s = new Set(p[rolId]||[]);
      s.has(codigo) ? s.delete(codigo) : s.add(codigo);
      return {...p, [rolId]: s};
    });
  };

  const hayCambios = rolId => {
    const rol = roles.find(r=>r.id===rolId);
    if (!rol || !pending[rolId]) return false;
    const saved = new Set(rol.permisos), curr = pending[rolId];
    if (saved.size!==curr.size) return true;
    for (const c of saved) if (!curr.has(c)) return true;
    return false;
  };

  const guardarPermisos = async () => {
    setSaving(true);
    try {
      await apiFetch(`/api/roles/${confirm.rol.id}/permisos`, { method:'PUT', body:{ permisos: confirm.codes } });
      showToast('success', `Permisos de "${confirm.rol.nombre}" actualizados.`);
      setConfirm(null); await cargar();
    } catch(e) { showToast('error', e.message); setConfirm(null); }
    finally { setSaving(false); }
  };

  const crearRol = async () => {
    if (!nuevoForm.nombre.trim()) return;
    setSaving(true);
    try {
      await apiFetch('/api/roles', { method:'POST', body: nuevoForm });
      showToast('success', `Rol "${nuevoForm.nombre}" creado.`);
      setModalNuevo(false); setNuevoForm({nombre:'',descripcion:''}); await cargar();
    } catch(e) { showToast('error', e.message); }
    finally { setSaving(false); }
  };

  const eliminarRol = async () => {
    setSaving(true);
    try {
      await apiFetch(`/api/roles/${delConfirm.id}`, { method:'DELETE' });
      showToast('success', `Rol "${delConfirm.nombre}" eliminado.`);
      setDelConfirm(null); await cargar();
    } catch(e) { showToast('error', e.message); setDelConfirm(null); }
    finally { setSaving(false); }
  };

  if (loading) return <div className="spinner"><div className="spin"/></div>;

  return (
    <div>
      {toast.text && <div className={`alert alert-${toast.type}`} style={{cursor:'pointer'}} onClick={()=>setToast({type:'',text:''})}>{toast.text}</div>}

      <div className="section-header" style={{marginBottom:12}}>
        <span style={{fontWeight:700,fontSize:15}}>🔑 Roles y Permisos</span>
        <button className="btn btn-primary btn-auto" onClick={()=>setModalNuevo(true)}>＋ Nuevo rol</button>
      </div>

      {roles.map(rol => {
        const isOpen  = expanded===rol.id;
        const pend    = pending[rol.id] || new Set(rol.permisos);
        const cambios = hayCambios(rol.id);

        return (
          <div key={rol.id}>
            <div className={`role-header ${isOpen?'open':''}`} onClick={()=>toggleExpand(rol.id)}>
              <span style={{flex:1,fontWeight:700,fontSize:15}}>{rol.nombre}</span>
              {rol.es_sistema===1 && <span className="role-sistema">sistema</span>}
              <span style={{fontSize:12,color:'var(--text2)',flexShrink:0}}>{rol.usuarios_count} usuario(s)</span>
              {!rol.es_sistema && (
                <button className="btn-icon btn-icon-danger" style={{padding:'3px 8px',fontSize:13}}
                  onClick={e=>{e.stopPropagation();setDelConfirm(rol);}}>🗑️</button>
              )}
              <span style={{fontSize:11,color:'var(--text2)'}}>{isOpen?'▲':'▼'}</span>
            </div>

            {isOpen && (
              <div className="role-body">
                {GRUPOS_PERM.map(g => {
                  const gPerms = permisos.filter(p=>p.grupo===g.key);
                  return (
                    <div key={g.key} className="perm-group">
                      <div className="perm-group-title">{g.label}</div>
                      <div className="perm-grid">
                        {gPerms.map(p => {
                          const on = pend.has(p.codigo);
                          return (
                            <div key={p.codigo} className={`perm-item ${on?'on':''}`}
                              onClick={()=>togglePerm(rol.id, p.codigo)}>
                              <div className={`perm-chk ${on?'on':''}`}>{on?'✓':''}</div>
                              <span className="perm-desc">{p.descripcion}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}

                {cambios ? (
                  <button className="btn btn-primary" style={{marginTop:4}} onClick={()=>setConfirm({rol, codes:[...pend]})}>
                    Guardar permisos de "{rol.nombre}"
                  </button>
                ) : (
                  <p style={{fontSize:12,color:'var(--text2)',marginTop:4}}>Sin cambios pendientes.</p>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Confirmar permisos */}
      {confirm && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setConfirm(null)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">⚠️ Confirmar cambio de permisos</span>
              <button className="modal-close" onClick={()=>setConfirm(null)}>✕</button>
            </div>
            <div className="alert alert-warning" style={{lineHeight:1.6}}>
              Esto va a generar el siguiente cambio: el rol <strong>"{confirm.rol.nombre}"</strong> tendrá
              <strong> {confirm.codes.length}</strong> permiso(s) habilitado(s).
              Afecta a <strong>{confirm.rol.usuarios_count}</strong> usuario(s) con este rol
              (deben volver a iniciar sesión para que el cambio surta efecto).
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={()=>setConfirm(null)}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={guardarPermisos} disabled={saving}>
                {saving?'Guardando…':'Confirmar cambio'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Eliminar rol */}
      {delConfirm && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setDelConfirm(null)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">⚠️ Eliminar rol</span>
              <button className="modal-close" onClick={()=>setDelConfirm(null)}>✕</button>
            </div>
            <p style={{marginBottom:12}}>Rol: <strong>{delConfirm.nombre}</strong></p>
            <div className="alert alert-warning">
              Esto va a generar el siguiente cambio: el rol "{delConfirm.nombre}" será
              eliminado permanentemente. Solo se puede eliminar si no tiene usuarios asignados.
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={()=>setDelConfirm(null)}>Cancelar</button>
              <button className="btn btn-danger btn-auto" onClick={eliminarRol} disabled={saving}>
                {saving?'Eliminando…':'Eliminar rol'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Nuevo rol */}
      {modalNuevo && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModalNuevo(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">Nuevo rol</span>
              <button className="modal-close" onClick={()=>setModalNuevo(false)}>✕</button>
            </div>
            <div className="form-group">
              <label className="form-label">Nombre del rol *</label>
              <input className="form-control" value={nuevoForm.nombre} autoFocus
                onChange={e=>setNuevoForm(f=>({...f,nombre:e.target.value}))} placeholder="Ej: Preceptor" />
            </div>
            <div className="form-group">
              <label className="form-label">Descripción</label>
              <input className="form-control" value={nuevoForm.descripcion}
                onChange={e=>setNuevoForm(f=>({...f,descripcion:e.target.value}))} placeholder="Opcional" />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={()=>setModalNuevo(false)}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={crearRol} disabled={saving||!nuevoForm.nombre.trim()}>
                {saving?'Creando…':'Crear rol'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
