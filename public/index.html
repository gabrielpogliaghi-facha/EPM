// ── BACKUP ──────────────────────────────────────────────────────────────────────
function Backup() {
  const [backups,    setBackups]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [creating,   setCreating]   = useState(false);
  const [descargando,setDescargando]= useState(null);
  const [restoring,  setRestoring]  = useState(null); // backup elegido para restaurar
  const [restSaving, setRestSaving] = useState(false);
  const [restDone,   setRestDone]   = useState(false);
  const [toast,      setToast]      = useState({ type:'', text:'' });

  const showToast = (t,m) => { setToast({type:t,text:m}); setTimeout(()=>setToast({type:'',text:''}),6000); };

  const formatSize = bytes => {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return Math.round(bytes/1024) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  };

  const formatFecha = s => {
    try {
      return new Date(s + 'T12:00').toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
    } catch { return s; }
  };

  const cargar = async () => {
    setLoading(true);
    try { setBackups(await apiFetch('/api/backup/lista')); }
    catch(e) { showToast('error', e.message); }
    finally { setLoading(false); }
  };
  useEffect(() => { cargar(); }, []);

  const hacerBackup = async () => {
    setCreating(true);
    try {
      const r = await apiFetch('/api/backup/crear', { method:'POST' });
      showToast('success', `✅ Backup creado: ${r.filename} (${formatSize(r.size)})`);
      cargar();
    } catch(e) { showToast('error', e.message); }
    finally { setCreating(false); }
  };

  const descargar = async (filename) => {
    setDescargando(filename);
    try {
      const res = await fetch(`/api/backup/descargar/${filename}`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      if (!res.ok) throw new Error('Error al descargar');
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) { showToast('error', e.message); }
    finally { setDescargando(null); }
  };

  const restaurar = async () => {
    setRestSaving(true);
    try {
      const r = await apiFetch(`/api/backup/restaurar/${restoring.filename}`, { method:'POST' });
      setRestoring(null);
      setRestDone(true);
      showToast('success', r.message);
    } catch(e) { showToast('error', e.message); }
    finally { setRestSaving(false); }
  };

  if (restDone) return (
    <div style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:64,marginBottom:16}}>🔄</div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:12}}>Servidor cerrado</h2>
      <p style={{fontSize:15,color:'var(--text2)',lineHeight:1.7}}>
        La restauración fue preparada exitosamente.<br/>
        <strong>Reiniciá el servidor</strong> con <code style={{background:'var(--bg3)',padding:'2px 6px',borderRadius:4}}>npm start</code> y volvé a iniciar sesión.
      </p>
    </div>
  );

  return (
    <div>
      {toast.text && <div className={`alert alert-${toast.type}`} style={{cursor:'pointer'}} onClick={()=>setToast({type:'',text:''})}>{toast.text}</div>}

      {/* Header */}
      <div className="card" style={{marginBottom:14}}>
        <div className="section-header" style={{marginBottom:0}}>
          <div>
            <div className="card-title" style={{marginBottom:4}}>💾 Backup del sistema</div>
            <p style={{fontSize:12,color:'var(--text2)'}}>Backup automático semanal · Base de datos: epm.db</p>
          </div>
          <button className="btn btn-primary btn-auto" onClick={hacerBackup} disabled={creating}>
            {creating ? 'Creando…' : '💾 Hacer backup ahora'}
          </button>
        </div>
      </div>

      {/* Lista de backups */}
      <div className="card">
        <div className="card-title" style={{marginBottom:12}}>📋 Backups disponibles</div>
        {loading ? <div className="spinner"><div className="spin"/></div>
        : backups.length===0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">💾</div>
            <p>No hay backups todavía. Creá uno con el botón de arriba.</p>
          </div>
        ) : backups.map(b => (
          <div key={b.filename} className="backup-item">
            <div style={{fontSize:28,flexShrink:0}}>🗄️</div>
            <div className="backup-fecha">
              <div className="backup-nombre">{formatFecha(b.fecha)}</div>
              <div className="backup-meta">{b.hora} · {formatSize(b.size)}</div>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0,flexWrap:'wrap'}}>
              <button className="btn btn-secondary btn-auto"
                onClick={()=>descargar(b.filename)} disabled={descargando===b.filename}>
                {descargando===b.filename ? '⏳' : '⬇️ Descargar'}
              </button>
              <button className="btn btn-auto"
                style={{background:'#fee2e2',color:'var(--danger)',border:'1.5px solid #fca5a5'}}
                onClick={()=>setRestoring(b)}>
                🔄 Restaurar
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* Modal confirmación restaurar */}
      {restoring && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:520}}>
            <div className="modal-header">
              <span className="modal-title" style={{color:'var(--danger)'}}>⚠️ Restaurar backup</span>
              <button className="modal-close" onClick={()=>setRestoring(null)}>✕</button>
            </div>

            <div className="restore-warning">
              <div style={{fontSize:20,marginBottom:10,fontWeight:800}}>⚠️ ADVERTENCIA — LEER ANTES DE CONFIRMAR</div>
              <p style={{marginBottom:10,lineHeight:1.6}}>
                Esto va a <strong>reemplazar TODOS los datos actuales</strong> (estudiantes, asistencias,
                planificaciones, usuarios) con los del backup del <strong>{formatFecha(restoring.fecha)}</strong>.
              </p>
              <p style={{marginBottom:10,lineHeight:1.6}}>
                ✅ Antes de restaurar, se creará un <strong>backup automático del estado actual</strong> por seguridad.
              </p>
              <p style={{lineHeight:1.6}}>
                🔄 Después de restaurar, el <strong>servidor se cerrará</strong> y deberás iniciarlo manualmente
                con <code style={{background:'rgba(0,0,0,.1)',padding:'1px 5px',borderRadius:3}}>npm start</code>.
              </p>
            </div>

            <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>
              Backup a restaurar: <strong>{restoring.filename}</strong> ({formatSize(restoring.size)})
            </p>

            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={()=>setRestoring(null)}>Cancelar</button>
              <button className="btn btn-auto" disabled={restSaving}
                style={{background:'var(--danger)',color:'#fff',border:'none'}}
                onClick={restaurar}>
                {restSaving ? 'Restaurando…' : '⚠️ Sí, restaurar este backup'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CURSOS ──────────────────────────────────────────────────────────────────────
function Cursos({ user }) {
  const [cursos,  setCursos]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving,  setSaving]  = useState(false);
  const [modal,   setModal]   = useState(null);
  const [editing, setEditing] = useState(null);
  const [nombre,  setNombre]  = useState('');
  const [delTarget, setDelTarget] = useState(null);
  const [toast,   setToast]   = useState({ type:'', text:'' });
  const [formErr, setFormErr] = useState('');

  const puede = (p) => user.permisos?.includes(p);

  const showToast = (type, text) => {
    setToast({ type, text });
    setTimeout(() => setToast({ type:'', text:'' }), 4000);
  };

  const cargar = async () => {
    setLoading(true);
    try { setCursos(await apiFetch('/api/cursos')); }
    catch (e) { showToast('error', e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { cargar(); }, []);

  const abrirNuevo   = () => { setEditing(null); setNombre(''); setFormErr(''); setModal('form'); };
  const abrirEditar  = (c) => { setEditing(c); setNombre(c.nombre); setFormErr(''); setModal('form'); };
  const cerrarModal  = ()  => setModal(null);

  const abrirBorrar = async (c) => {
    try {
      const info = await apiFetch(`/api/cursos/${c.id}/info`);
      setDelTarget({ curso: c, estudiantes: info.estudiantes });
      setModal('delete');
    } catch (e) { showToast('error', e.message); }
  };

  const guardar = async () => {
    const n = nombre.trim();
    if (!n) { setFormErr('El nombre no puede estar vacío.'); return; }
    setSaving(true); setFormErr('');
    try {
      if (editing) {
        await apiFetch(`/api/cursos/${editing.id}`, { method:'PUT', body:{ nombre:n } });
        showToast('success', `"${n}" actualizado.`);
      } else {
        await apiFetch('/api/cursos', { method:'POST', body:{ nombre:n } });
        showToast('success', `Curso "${n}" creado.`);
      }
      cerrarModal(); cargar();
    } catch (e) { setFormErr(e.message); }
    finally { setSaving(false); }
  };

  const confirmarBorrar = async () => {
    setSaving(true);
    try {
      const r = await apiFetch(`/api/cursos/${delTarget.curso.id}`, { method:'DELETE' });
      const txt = r.accion === 'desactivado'
        ? `Curso desactivado. Los ${r.estudiantes} estudiantes conservan todos sus datos.`
        : 'Curso eliminado permanentemente.';
      showToast('success', txt); cerrarModal(); cargar();
    } catch (e) { showToast('error', e.message); }
    finally { setSaving(false); }
  };

  return (
    <div>
      {toast.text && (
        <div className={`alert alert-${toast.type}`} style={{cursor:'pointer'}}
          onClick={() => setToast({ type:'', text:'' })}>
          {toast.text}
        </div>
      )}

      <div className="card">
        <div className="section-header">
          <span className="card-title" style={{marginBottom:0}}>🏫 Cursos</span>
          {puede('administrar_cursos') && (
            <button className="btn btn-primary btn-auto" onClick={abrirNuevo}>＋ Nuevo curso</button>
          )}
        </div>

        {loading ? (
          <div className="spinner"><div className="spin" /></div>
        ) : cursos.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">🏫</div>
            <p>No hay cursos cargados todavía.</p>
          </div>
        ) : cursos.map(c => (
          <div key={c.id} className="list-row">
            <span className="list-row-label">{c.nombre}</span>
            <span className="badge-count">{c.estudiantes} est.</span>
            {puede('administrar_cursos') && (
              <div className="row-actions">
                <button className="btn-icon" onClick={() => abrirEditar(c)} title="Renombrar">✏️</button>
                <button className="btn-icon btn-icon-danger" onClick={() => abrirBorrar(c)} title="Eliminar">🗑️</button>
              </div>
            )}
          </div>
        ))}
      </div>

      {modal === 'form' && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && cerrarModal()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">{editing ? 'Renombrar curso' : 'Nuevo curso'}</span>
              <button className="modal-close" onClick={cerrarModal}>✕</button>
            </div>
            {formErr && <div className="alert alert-error">{formErr}</div>}
            <div className="form-group">
              <label className="form-label">Nombre del curso</label>
              <input className="form-control" value={nombre}
                onChange={e => setNombre(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && guardar()}
                placeholder="Ej: Mojarritas" autoFocus />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrarModal}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={guardar} disabled={saving}>
                {saving ? 'Guardando…' : editing ? 'Guardar cambios' : 'Crear curso'}
              </button>
            </div>
          </div>
        </div>
      )}

      {modal === 'delete' && delTarget && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && cerrarModal()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">
                ⚠️ {delTarget.estudiantes > 0 ? 'Desactivar' : 'Eliminar'} curso
              </span>
              <button className="modal-close" onClick={cerrarModal}>✕</button>
            </div>
            <p style={{marginBottom:12}}>Curso: <strong>{delTarget.curso.nombre}</strong></p>
            {delTarget.estudiantes > 0 ? (
              <div className="alert alert-warning">
                <strong>Este curso tiene {delTarget.estudiantes} estudiante(s).</strong><br />
                El curso quedará <strong>desactivado</strong> y no aparecerá en los listados.
                Los estudiantes y todos sus registros (asistencias, etc.) se conservan intactos;
                quedan sin curso asignado hasta que los reasignes desde su ficha.
              </div>
            ) : (
              <div className="alert alert-warning">
                Este curso no tiene estudiantes y se <strong>eliminará permanentemente</strong>.
              </div>
            )}
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrarModal}>Cancelar</button>
              <button className="btn btn-danger btn-auto" onClick={confirmarBorrar} disabled={saving}>
                {saving ? 'Procesando…' : delTarget.estudiantes > 0 ? 'Desactivar curso' : 'Eliminar curso'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── INSTRUMENTOS ────────────────────────────────────────────────────────────────
function Instrumentos({ user }) {
  const [instrumentos, setInstrumentos] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [modal,    setModal]    = useState(null);
  const [editing,  setEditing]  = useState(null);
  const [nombre,   setNombre]   = useState('');
  const [delTarget,setDelTarget]= useState(null);
  const [toast,    setToast]    = useState({ type:'', text:'' });
  const [formErr,  setFormErr]  = useState('');
  const puede = (p) => user.permisos?.includes(p);

  const showToast = (type, text) => { setToast({type,text}); setTimeout(()=>setToast({type:'',text:''}),4000); };
  const cargar = async () => {
    setLoading(true);
    try { setInstrumentos(await apiFetch('/api/instrumentos')); }
    catch(e) { showToast('error', e.message); }
    finally { setLoading(false); }
  };
  useEffect(() => { cargar(); }, []);

  const abrirNuevo  = () => { setEditing(null); setNombre(''); setFormErr(''); setModal('form'); };
  const abrirEditar = (i) => { setEditing(i); setNombre(i.nombre); setFormErr(''); setModal('form'); };
  const cerrar      = () => setModal(null);

  const guardar = async () => {
    const n = nombre.trim();
    if (!n) { setFormErr('El nombre no puede estar vacío.'); return; }
    setSaving(true); setFormErr('');
    try {
      if (editing) {
        await apiFetch(`/api/instrumentos/${editing.id}`, { method:'PUT', body:{nombre:n} });
        showToast('success', `"${n}" actualizado.`);
      } else {
        await apiFetch('/api/instrumentos', { method:'POST', body:{nombre:n} });
        showToast('success', `Instrumento "${n}" creado.`);
      }
      cerrar(); cargar();
    } catch(e) { setFormErr(e.message); }
    finally { setSaving(false); }
  };

  const confirmarBorrar = async () => {
    setSaving(true);
    try {
      await apiFetch(`/api/instrumentos/${delTarget.id}`, { method:'DELETE' });
      showToast('success', 'Instrumento eliminado.'); cerrar(); cargar();
    } catch(e) { showToast('error', e.message); }
    finally { setSaving(false); setDelTarget(null); }
  };

  return (
    <div>
      {toast.text && <div className={`alert alert-${toast.type}`} style={{cursor:'pointer'}} onClick={()=>setToast({type:'',text:''})}>{toast.text}</div>}
      <div className="card">
        <div className="section-header">
          <span className="card-title" style={{marginBottom:0}}>🎸 Instrumentos</span>
          {puede('administrar_cursos') && (
            <button className="btn btn-primary btn-auto" onClick={abrirNuevo}>＋ Nuevo</button>
          )}
        </div>
        <p style={{fontSize:12,color:'var(--text2)',marginBottom:12}}>
          Los instrumentos se combinan con los niveles (Mojarritas → Pulpos) para formar las inscripciones de cada estudiante.
        </p>
        {loading ? <div className="spinner"><div className="spin"/></div>
        : instrumentos.length === 0
          ? <div className="empty-state"><div className="empty-state-icon">🎸</div><p>No hay instrumentos cargados.</p></div>
          : instrumentos.map(i => (
          <div key={i.id} className="list-row">
            <span className="list-row-label">{i.nombre}</span>
            <span className="badge-count">{Number(i.inscripciones)} insc.</span>
            {puede('administrar_cursos') && (
              <div className="row-actions">
                <button className="btn-icon" onClick={()=>abrirEditar(i)} title="Renombrar">✏️</button>
                <button className="btn-icon btn-icon-danger"
                  onClick={()=>{ setDelTarget(i); setModal('delete'); }} title="Eliminar">🗑️</button>
              </div>
            )}
          </div>
        ))}
      </div>

      {modal === 'form' && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&cerrar()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">{editing ? 'Renombrar instrumento' : 'Nuevo instrumento'}</span>
              <button className="modal-close" onClick={cerrar}>✕</button>
            </div>
            {formErr && <div className="alert alert-error">{formErr}</div>}
            <div className="form-group">
              <label className="form-label">Nombre del instrumento</label>
              <input className="form-control" value={nombre}
                onChange={e=>setNombre(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&guardar()}
                placeholder="Ej: Guitarra, Canto, Batería…" autoFocus />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrar}>Cancelar</button>
              <button className="btn btn-primary btn-auto" onClick={guardar} disabled={saving}>
                {saving ? 'Guardando…' : editing ? 'Guardar cambios' : 'Crear instrumento'}
              </button>
            </div>
          </div>
        </div>
      )}

      {modal === 'delete' && delTarget && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&cerrar()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">⚠️ Eliminar instrumento</span>
              <button className="modal-close" onClick={cerrar}>✕</button>
            </div>
            <p style={{marginBottom:12}}>Instrumento: <strong>{delTarget.nombre}</strong></p>
            {Number(delTarget.inscripciones) > 0
              ? <div className="alert alert-error">Tiene {Number(delTarget.inscripciones)} inscripción(es) activa(s). Quitálas desde las fichas de los estudiantes antes de eliminar el instrumento.</div>
              : <div className="alert alert-warning">Esta acción no puede deshacerse.</div>
            }
            <div className="modal-footer">
              <button className="btn btn-secondary btn-auto" onClick={cerrar}>Cancelar</button>
              {Number(delTarget.inscripciones) === 0 && (
                <button className="btn btn-danger btn-auto" onClick={confirmarBorrar} disabled={saving}>
                  {saving ? 'Eliminando…' : 'Eliminar'}
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PÁGINA DE ACEPTAR INVITACIÓN ─────────────────────────────────────────────────
function InvitacionPage({ token, onDone }) {
  const [info,    setInfo]   = useState(null); // {email, rol_nombre}
  const [cargando,setCargando]= useState(true);
  const [form,    setForm]   = useState({ nombre:'', password:'', confirm:'' });
  const [saving,  setSaving] = useState(false);
  const [error,   setError]  = useState('');
  const [exito,   setExito]  = useState(false);

  useEffect(() => {
    apiFetch(`/api/invitaciones/verificar/${token}`)
      .then(d => setInfo(d))
      .catch(e => setError(e.message || 'Invitación inválida o expirada'))
      .finally(() => setCargando(false));
  }, [token]);

  const set = (k, v) => setForm(f => ({...f, [k]:v}));

  const submit = async (e) => {
    e.preventDefault();
    if (form.password !== form.confirm) { setError('Las contraseñas no coinciden'); return; }
    if (form.password.length < 6)       { setError('La contraseña debe tener al menos 6 caracteres'); return; }
    setSaving(true); setError('');
    try {
      await apiFetch('/api/invitaciones/aceptar', {
        method: 'POST',
        body:   { token, nombre: form.nombre, password: form.password },
      });
      setExito(true);
    } catch(err) { setError(err.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="login-page">
      <div className="login-card" style={{maxWidth:420}}>
        <div className="login-logo">
          <img src="/logo-epm.jpg" alt="EPM" style={{borderRadius:10}} />
          <h1>EPM</h1>
          <p>Escuela Popular de Música</p>
        </div>

        {cargando ? <div className="spinner"><div className="spin" /></div>
        : exito ? (
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>🎉</div>
            <div className="alert alert-success" style={{marginBottom:20}}>
              ¡Cuenta creada exitosamente! Ya podés iniciar sesión con tu email y contraseña.
            </div>
            <button className="btn btn-primary" onClick={onDone}>Ir al inicio de sesión</button>
          </div>
        ) : error && !info ? (
          <div>
            <div className="login-error">{error}</div>
            <p style={{fontSize:13,color:'var(--text2)',textAlign:'center',marginTop:8}}>
              Si el link expiró, pedile a quien te invitó que reenvíe la invitación.
            </p>
            <button className="btn btn-primary" style={{marginTop:16}} onClick={onDone}>Volver al inicio</button>
          </div>
        ) : info ? (
          <>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:14,marginBottom:20,textAlign:'center'}}>
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:4}}>Fuiste invitado/a como</div>
              <div style={{fontWeight:800,fontSize:17,color:'var(--primary)'}}>{info.rol_nombre}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{info.email}</div>
            </div>
            {error && <div className="login-error">{error}</div>}
            <form onSubmit={submit}>
              <div className="form-group">
                <label className="form-label">Tu nombre completo *</label>
                <input className="form-control" value={form.nombre} required autoFocus
                  onChange={e => set('nombre', e.target.value)} placeholder="Nombre y Apellido" />
              </div>
              <div className="form-group">
                <label className="form-label">Email</label>
                <input className="form-control" value={info.email} disabled
                  style={{opacity:.7,cursor:'not-allowed'}} />
              </div>
              <div className="form-group">
                <label className="form-label">Contraseña *</label>
                <input className="form-control" type="password" value={form.password} required
                  onChange={e => set('password', e.target.value)} placeholder="Mínimo 6 caracteres" />
              </div>
              <div className="form-group">
                <label className="form-label">Confirmar contraseña *</label>
                <input className="form-control" type="password" value={form.confirm} required
                  onChange={e => set('confirm', e.target.value)} placeholder="Repetí la contraseña" />
              </div>
              <button className="btn btn-primary" type="submit" disabled={saving}>
                {saving ? 'Creando cuenta...' : 'Crear mi cuenta →'}
              </button>
            </form>
          </>
        ) : null}
      </div>
    </div>
  );
}

// ── GESTIÓN DE INVITACIONES ───────────────────────────────────────────────────────
const ESTADO_INVITE = {
  pendiente:  { label:'Pendiente',  cls:'inv-pendiente'  },
  aceptada:   { label:'Aceptada',   cls:'inv-aceptada'   },
  expirada:   { label:'Expirada',   cls:'inv-expirada'   },
  cancelada:  { label:'Cancelada',  cls:'inv-cancelada'  },
};

function GestionInvitaciones() {
  const [lista,     setLista]    = useState([]);
  const [roles,     setRoles]    = useState([]);
  const [cursos,    setCursos]   = useState([]);
  const [cargando,  setCargando] = useState(true);
  const [modal,     setModal]    = useState(false);
  const [error,     setError]    = useState('');
  const [toast,     setToast]    = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };

  const cargar = useCallback(async () => {
    setCargando(true);
    try {
      const [inv, rs, cs] = await Promise.all([
        apiFetch('/api/invitaciones'),
        apiFetch('/api/roles'),
        apiFetch('/api/cursos'),
      ]);
      setLista(inv); setRoles(rs); setCursos(cs);
    } catch(e) { setError(e.message); }
    finally { setCargando(false); }
  }, []);
  useEffect(() => { cargar(); }, [cargar]);

  const cancelar = async (id) => {
    if (!confirm('¿Cancelar esta invitación?')) return;
    try { await apiFetch(`/api/invitaciones/${id}`, { method:'DELETE' }); showToast('Invitación cancelada'); cargar(); }
    catch(e) { alert(e.message); }
  };

  const reenviar = async (id) => {
    try { await apiFetch(`/api/invitaciones/${id}/reenviar`, { method:'POST' }); showToast('Invitación reenviada'); cargar(); }
    catch(e) { alert(e.message); }
  };

  const eliminar = async (id) => {
    if (!confirm('¿Eliminar esta invitación del historial?')) return;
    try { await apiFetch(`/api/invitaciones/${id}`, { method:'DELETE' }); showToast('Eliminada'); cargar(); }
    catch(e) { alert(e.message); }
  };

  const pendientes = lista.filter(i => i.estado === 'pendiente');
  const resto      = lista.filter(i => i.estado !== 'pendiente');

  return (
    <div>
      <div className="section-header">
        <h2 style={{fontSize:16,fontWeight:800}}>📩 Invitaciones</h2>
        <button className="btn btn-primary btn-auto" onClick={() => setModal(true)}>
          + Invitar usuario
        </button>
      </div>

      {toast && <div className="alert alert-success" style={{marginBottom:12}}>{toast}</div>}
      {error && <div className="alert alert-error">{error}</div>}

      {cargando ? <div className="spinner"><div className="spin"/></div> : (
        lista.length === 0
          ? <div className="empty-state"><div className="empty-state-icon">📩</div><div>No hay invitaciones enviadas</div></div>
          : <>
              {pendientes.length > 0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>
                    Pendientes ({pendientes.length})
                  </div>
                  {pendientes.map(inv => <InvRow key={inv.id} inv={inv} onCancelar={cancelar} onReenviar={reenviar} onEliminar={eliminar} />)}
                </div>
              )}
              {resto.length > 0 && (
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>
                    Historial
                  </div>
                  {resto.map(inv => <InvRow key={inv.id} inv={inv} onCancelar={cancelar} onReenviar={reenviar} onEliminar={eliminar} />)}
                </div>
              )}
            </>
      )}

      {modal && (
        <ModalInvitar roles={roles} cursos={cursos}
          onClose={() => setModal(false)}
          onEnviado={(res) => { setModal(false); showToast(`✅ ${res.enviadas} invitación/es enviada/s`); cargar(); }}
        />
      )}
    </div>
  );
}

function InvRow({ inv, onCancelar, onReenviar, onEliminar }) {
  const est = ESTADO_INVITE[inv.estado] || { label: inv.estado, cls: 'inv-pendiente' };
  const dias = Math.ceil((new Date(inv.expires_at) - Date.now()) / 86400000);
  return (
    <div className="inv-row">
      <div style={{flex:1,minWidth:0}}>
        <div className="inv-email">{inv.email}</div>
        <div className="inv-meta">
          {inv.rol_nombre}
          {inv.estado === 'pendiente' && dias > 0 && ` · expira en ${dias}d`}
          {inv.estado === 'pendiente' && dias <= 0 && ' · expira hoy'}
          {' · '}{inv.creado_por_nombre}
        </div>
      </div>
      <span className={`inv-badge ${est.cls}`}>{est.label}</span>
      {inv.estado === 'pendiente' && (
        <button className="btn-icon" title="Cancelar" onClick={() => onCancelar(inv.id)}>✕</button>
      )}
      {(inv.estado === 'expirada' || inv.estado === 'cancelada') && (<>
        <button className="btn-icon" title="Reenviar nueva invitación" onClick={() => onReenviar(inv.id)}>↩</button>
        <button className="btn-icon btn-icon-danger" title="Eliminar del historial" onClick={() => onEliminar(inv.id)}>🗑</button>
      </>)}
    </div>
  );
}

function ModalInvitar({ roles, cursos, onClose, onEnviado }) {
  const [emailsRaw,    setEmailsRaw]    = useState('');
  const [rolId,        setRolId]        = useState(String(roles[0]?.id || ''));
  const [cursosIds,    setCursosIds]    = useState([]);
  const [saving,       setSaving]       = useState(false);
  const [error,        setError]        = useState('');
  // Usuarios inactivos detectados que esperan confirmación para reactivar
  const [inactivosPendientes, setInactivosPendientes] = useState([]); // [{email, usuario_id}]

  const emails = emailsRaw.split(/[\n,;]+/).map(e => e.trim()).filter(e => e.includes('@'));

  const toggleCurso = (id) => setCursosIds(c => c.includes(id) ? c.filter(x=>x!==id) : [...c, id]);

  const submit = async (e) => {
    e.preventDefault();
    if (!emails.length) { setError('Ingresá al menos un email válido'); return; }
    if (!rolId)          { setError('Seleccioná un rol'); return; }
    setSaving(true); setError('');
    try {
      const data = await apiFetch('/api/invitaciones', {
        method: 'POST',
        body:   { emails, rol_id: rolId, cursos_ids: cursosIds },
      });

      // Detectar emails de usuarios dados de baja
      const inactivos = data.resultados.filter(r => r.estado === 'ya_registrado_inactivo');
      if (inactivos.length) {
        setInactivosPendientes(inactivos);
        setSaving(false);
        return; // Esperar confirmación del usuario
      }

      const enviadas = data.resultados.filter(r => r.estado === 'enviada').length;
      const omitidas = data.resultados.filter(r => r.estado !== 'enviada');
      let msg = `✅ ${enviadas} invitación/es enviada/s`;
      if (omitidas.length) {
        msg += `. Omitidos: ${omitidas.map(r=>`${r.email} (${r.estado === 'ya_registrado' ? 'ya tiene cuenta' : r.estado})`).join(', ')}`;
      }
      onEnviado({ enviadas, mensaje: msg });
    } catch(err) { setError(err.message); }
    finally { setSaving(false); }
  };

  const rolNombre = roles.find(r => String(r.id) === String(rolId))?.nombre || '';

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal modal-lg" style={{position:'relative',overflow:'hidden'}}>
        <div className="modal-header">
          <span className="modal-title">📩 Invitar usuario/s</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        {error && <div className="alert alert-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">
              Email/s *
              <span style={{fontWeight:400,color:'var(--text2)',fontSize:11,marginLeft:6}}>
                (uno por línea o separados por coma para envío masivo)
              </span>
            </label>
            <textarea className="form-control" rows={4} value={emailsRaw}
              onChange={e => setEmailsRaw(e.target.value)}
              placeholder="usuario@ejemplo.com&#10;otro@ejemplo.com&#10;tercero@ejemplo.com" />
            {emails.length > 0 && (
              <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>
                {emails.length} email/s detectado/s
              </div>
            )}
          </div>
          <div className="form-group">
            <label className="form-label">Rol asignado *</label>
            <select className="form-control" value={rolId} onChange={e => setRolId(e.target.value)} required>
              {roles.map(r => <option key={r.id} value={r.id}>{r.nombre}</option>)}
            </select>
          </div>
          {cursos.length > 0 && (
            <div className="form-group">
              <label className="form-label">Cursos asignados (opcional)</label>
              <div className="curso-checks">
                {cursos.map(c => (
                  <button key={c.id} type="button"
                    className={`curso-check-btn ${cursosIds.includes(c.id)?'selected':''}`}
                    onClick={() => toggleCurso(c.id)}>
                    {c.nombre}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Preview antes de enviar masivo */}
          {emails.length > 1 && (
            <div className="alert alert-warning" style={{fontSize:13,marginBottom:0}}>
              Se van a enviar <strong>{emails.length} invitaciones</strong> con rol <strong>{rolNombre}</strong>
              {cursosIds.length > 0 && ` y ${cursosIds.length} curso/s`}.
            </div>
          )}

          <div className="modal-footer">
            <button type="button" className="btn btn-secondary btn-auto" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn-primary btn-auto" disabled={saving || !emails.length}>
              {saving ? 'Enviando...' : `📩 Enviar${emails.length > 1 ? ` ${emails.length} invitaciones` : ' invitación'}`}
            </button>
          </div>
        </form>

        {/* Confirmación para usuarios dados de baja */}
        {inactivosPendientes.length > 0 && (
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.45)',borderRadius:'var(--radius)',
                       display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
            <div style={{background:'var(--card)',borderRadius:12,padding:24,width:'100%',maxWidth:380}}>
              <div style={{fontWeight:800,fontSize:15,marginBottom:10}}>⚠️ Email/s con cuenta dada de baja</div>
              {inactivosPendientes.map(r => (
                <div key={r.email} style={{fontSize:13,background:'var(--bg3)',borderRadius:8,padding:'6px 10px',marginBottom:6}}>
                  {r.email}
                </div>
              ))}
              <p style={{fontSize:13,color:'var(--text2)',margin:'10px 0 16px',lineHeight:1.5}}>
                {inactivosPendientes.length === 1
                  ? 'Este email ya existía pero el usuario fue dado de baja.'
                  : 'Estos emails ya existían pero los usuarios fueron dados de baja.'}
                {' '}¿Querés reactivarlos para que puedan volver a acceder?
              </p>
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button className="btn btn-secondary btn-auto" onClick={() => setInactivosPendientes([])}>
                  Cancelar
                </button>
                <button className="btn btn-primary btn-auto" onClick={async () => {
                  setSaving(true);
                  try {
                    for (const r of inactivosPendientes) {
                      await apiFetch(`/api/usuarios/${r.usuario_id}/reactivar`, { method:'POST' });
                    }
                    setInactivosPendientes([]);
                    onEnviado({ enviadas: 0, mensaje: `✅ ${inactivosPendientes.length} usuario/s reactivado/s. Ya pueden iniciar sesión con su contraseña anterior.` });
                  } catch(e) { setError(e.message); setInactivosPendientes([]); }
                  finally { setSaving(false); }
                }}>
                  ↩ Reactivar {inactivosPendientes.length > 1 ? `${inactivosPendientes.length} usuarios` : 'usuario'}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── NOTIFICACIONES BELL ─────────────────────────────────────────────────────────
function NotificacionesBell({ user }) {
  const [open,          setOpen]         = useState(false);
  const [notifs,        setNotifs]       = useState([]);
  const [noLeidas,      setNoLeidas]     = useState(0);
  const [cargando,      setCargando]     = useState(false);

  const fetchCount = useCallback(async () => {
    try {
      const d = await apiFetch('/api/notificaciones/no-leidas');
      setNoLeidas(d.total);
    } catch(e) {}
  }, []);

  // Poll cada 30 s
  useEffect(() => {
    fetchCount();
    const t = setInterval(fetchCount, 30000);
    return () => clearInterval(t);
  }, [fetchCount]);

  const abrirPanel = async () => {
    if (open) { setOpen(false); return; }
    setOpen(true);
    setCargando(true);
    try {
      const data = await apiFetch('/api/notificaciones');
      setNotifs(data);
      if (noLeidas > 0) {
        await apiFetch('/api/notificaciones/leer-todas', { method:'PUT' });
        setNoLeidas(0);
      }
    } catch(e) {}
    finally { setCargando(false); }
  };

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (!e.target.closest('.notif-bell-wrap')) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const dotCls = (tipo) => `notif-dot notif-dot-${tipo}`;

  return (
    <div className="notif-bell-wrap">
      <button className="notif-bell-btn" onClick={abrirPanel} title="Notificaciones">
        🔔
        {noLeidas > 0 && <span className="notif-badge">{noLeidas > 9 ? '9+' : noLeidas}</span>}
      </button>
      {open && (
        <div className="notif-panel">
          <div className="notif-panel-header">
            <span>Notificaciones</span>
            {notifs.some(n => !n.leida) && (
              <button className="btn btn-secondary btn-auto" style={{fontSize:11,padding:'3px 8px'}}
                onClick={async () => {
                  await apiFetch('/api/notificaciones/leer-todas', { method:'PUT' });
                  setNotifs(ns => ns.map(n => ({...n, leida:1})));
                  setNoLeidas(0);
                }}>
                ✓ Leer todo
              </button>
            )}
          </div>
          <div className="notif-panel-list">
            {cargando ? (
              <div className="notif-empty">Cargando...</div>
            ) : notifs.length === 0 ? (
              <div className="notif-empty">Sin notificaciones</div>
            ) : notifs.map(n => (
              <div key={n.id} className={`notif-item ${!n.leida ? 'unread' : ''}`}
                onClick={async () => {
                  if (!n.leida) {
                    await apiFetch(`/api/notificaciones/${n.id}/leer`, { method:'PUT' });
                    setNotifs(ns => ns.map(x => x.id===n.id ? {...x,leida:1} : x));
                  }
                }}>
                <div className="notif-item-header">
                  <div className={dotCls(n.tipo)} />
                  <div className="notif-item-titulo">{n.titulo}</div>
                </div>
                <div className="notif-item-msg">{n.mensaje}</div>
                <div className="notif-item-time">{tiempoRelativo(n.created_at)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── MODAL EVENTO ─────────────────────────────────────────────────────────────────
function ModalEvento({ evento, cursos, onClose, onGuardado }) {
  const inicial = evento ? {
    titulo:      evento.titulo || '',
    descripcion: evento.descripcion || '',
    fecha:       evento.fecha || '',
    hora_inicio: evento.hora_inicio || '',
    hora_fin:    evento.hora_fin || '',
    lugar:       evento.lugar || '',
    tipo:        evento.tipo || 'otro',
    alcance:     evento.alcance || 'institucion',
    cursos_ids:  evento.cursos_ids || [],
  } : { titulo:'', descripcion:'', fecha:'', hora_inicio:'', hora_fin:'', lugar:'',
        tipo:'otro', alcance:'institucion', cursos_ids:[] };

  const [form,    setForm]   = useState(inicial);
  const [saving,  setSaving] = useState(false);
  const [error,   setError]  = useState('');

  const set = (k, v) => setForm(f => ({...f, [k]:v}));

  const toggleCurso = (id) => {
    setForm(f => {
      const ids = f.cursos_ids.includes(id) ? f.cursos_ids.filter(x=>x!==id) : [...f.cursos_ids, id];
      return {...f, cursos_ids: ids};
    });
  };

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setSaving(true);
    try {
      const method = evento?.id ? 'PUT' : 'POST';
      const url    = evento?.id ? `/api/eventos/${evento.id}` : '/api/eventos';
      const data   = await apiFetch(url, { method, body: form });
      onGuardado(data);
    } catch(e) { setError(e.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <span className="modal-title">{evento?.id ? 'Editar evento' : 'Nuevo evento'}</span>
          <button className="modal-close" onClick={onClose}>×</button>

        {error && <div className="alert alert-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Título *</label>
            <input className="form-control" value={form.titulo}
              onChange={e => set('titulo', e.target.value)} required placeholder="Ej: Muestra de fin de año" />
          </div>
          <div className="form-group">
            <label className="form-label">Tipo *</label>
            <div className="tipo-selector">
              {Object.entries(TIPO_EVENTO).map(([k,v]) => (
                <button key={k} type="button"
                  className={`tipo-btn ${form.tipo===k?'selected':''}`}
                  style={{background:v.color}}
                  onClick={() => set('tipo', k)}>
                  {v.label}
                </button>
              ))}
            </div>
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Fecha *</label>
              <input className="form-control" type="date" value={form.fecha}
                onChange={e => set('fecha', e.target.value)} required />
            </div>
            <div className="form-group">
              <label className="form-label">Lugar</label>
              <input className="form-control" value={form.lugar}
                onChange={e => set('lugar', e.target.value)} placeholder="Aula, Salón, etc." />
            </div>
            <div className="form-group">
              <label className="form-label">Hora inicio</label>
              <input className="form-control" type="time" value={form.hora_inicio}
                onChange={e => set('hora_inicio', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Hora fin</label>
              <input className="form-control" type="time" value={form.hora_fin}
                onChange={e => set('hora_fin', e.target.value)} />
            </div>
          </div>
          <div className="form-group col-full">
            <label className="form-label">Descripción</label>
            <textarea className="form-control" rows={2} value={form.descripcion}
              onChange={e => set('descripcion', e.target.value)} placeholder="Detalles del evento..." />
          </div>
          <div className="form-group">
            <label className="form-label">Dirigido a</label>
            <div className="alcance-btns">
              <button type="button" className={`alcance-btn ${form.alcance==='institucion'?'selected':''}`}
                onClick={() => set('alcance','institucion')}>
                🏫 Toda la institución
              </button>
              <button type="button" className={`alcance-btn ${form.alcance==='cursos'?'selected':''}`}
                onClick={() => set('alcance','cursos')}>
                👥 Cursos específicos
              </button>
            </div>
          </div>

            <div className="form-group">
              <label className="form-label">Seleccioná los cursos</label>
              <div className="curso-checks">
                {cursos.map(c => (
                  <button key={c.id} type="button"
                    className={`curso-check-btn ${form.cursos_ids.includes(c.id)?'selected':''}`}
                    onClick={() => toggleCurso(c.id)}>

        </form>
      </div>
    </div>
  );
}

// ── CALENDARIO ───────────────────────────────────────────────────────────────────
function Calendario({ user }) {
  const puede = (p) => user.permisos?.includes(p);

  const hoy = new Date();
  const [año,     setAnio]     = useState(hoy.getFullYear());
  const [mes,     setMes]      = useState(hoy.getMonth()); // 0-based
  const [vista,   setVista]    = useState('calendario'); // 'calendario' | 'agenda'
  const [eventos, setEventos]  = useState([]);
  const [cursos,  setCursos]   = useState([]);
  const [cargando, setCargando] = useState(false);

  const [modalCrear,   setModalCrear]   = useState(false);
  const [modalEditar,  setModalEditar]  = useState(null);
  const [modalDetalle, setModalDetalle] = useState(null);
  const [modalCambio,  setModalCambio]  = useState(null);
  const [cumplesMes,   setCumplesMes]   = useState([]); // cumpleaños del mes visible
  const [modalCumple,  setModalCumple]  = useState(null); // {dia, lista}

  // Carga cursos una sola vez
  useEffect(() => {
    apiFetch('/api/cursos').then(d => setCursos(d)).catch(() => {});
  }, []);

  // Carga eventos + cumpleaños al cambiar mes/año
  const cargarEventos = useCallback(async () => {
    setCargando(true);
    try {
      const desde = new Date(año, mes - 1, 1).toISOString().slice(0, 10);
      const hasta  = new Date(año, mes + 2, 0).toISOString().slice(0, 10);
      const [evData, cumpleData] = await Promise.all([
        apiFetch(`/api/eventos?desde=${desde}&hasta=${hasta}`),
        apiFetch(`/api/cumpleanios?mes=${mes + 1}&anio=${año}`),
      ]);
      setEventos(evData);
      setCumplesMes(cumpleData);
    } catch(e) {}
    finally { setCargando(false); }
  }, [año, mes]);

  useEffect(() => { cargarEventos(); }, [cargarEventos]);

  const navMes = (dir) => {
    if (mes + dir < 0)  { setAnio(a => a-1); setMes(11); }
    else if (mes + dir > 11) { setAnio(a => a+1); setMes(0); }
    else setMes(m => m + dir);
  };

  const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DIAS_ES  = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  // Construye la grilla del mes
  const buildGrid = () => {
    const primer = new Date(año, mes, 1);
    const ultimo = new Date(año, mes + 1, 0);
    let dow = primer.getDay(); // 0=Dom
    dow = dow === 0 ? 6 : dow - 1; // convertir a 0=Lun

    const dias = [];
    // días del mes anterior para completar la primera fila
    for (let i = dow - 1; i >= 0; i--) {
      const d = new Date(año, mes, -i);
      dias.push({ fecha: d.toISOString().slice(0,10), actual: false });
    }
    // días del mes actual
    for (let i = 1; i <= ultimo.getDate(); i++) {
      const d = new Date(año, mes, i);
      dias.push({ fecha: d.toISOString().slice(0,10), actual: true });
    }
    // días del mes siguiente para completar la última fila
    let resto = dias.length % 7;
    if (resto !== 0) {
      for (let i = 1; i <= 7 - resto; i++) {
        const d = new Date(año, mes + 1, i);
        dias.push({ fecha: d.toISOString().slice(0,10), actual: false });
      }
    }
    return dias;
  };

  const todayStr = hoy.toISOString().slice(0,10);
  const grid = buildGrid();

  // Mapa fecha → eventos
  const eventosPorFecha = {};
  eventos.forEach(ev => {
    if (!eventosPorFecha[ev.fecha]) eventosPorFecha[ev.fecha] = [];
    eventosPorFecha[ev.fecha].push(ev);
  });

  // Mapa dia → cumpleaños del mes visible
  const cumplesPorDia = {};
  cumplesMes.forEach(c => {
    if (!cumplesPorDia[c.dia]) cumplesPorDia[c.dia] = [];
    cumplesPorDia[c.dia].push(c);
  });

  // Vista agenda: eventos del mes actual ordenados
  const eventosDelMes = eventos
    .filter(ev => {
      const [y,m] = ev.fecha.split('-').map(Number);
      return y === año && m - 1 === mes;
    })
    .sort((a,b) => a.fecha.localeCompare(b.fecha) || (a.hora_inicio||'').localeCompare(b.hora_inicio||''));

  const cerrarTodo = () => {
    setModalCrear(false); setModalEditar(null); setModalDetalle(null); setModalCambio(null);
  };

  const onGuardado = (ev) => {
    cargarEventos();
    cerrarTodo();
  };

  const onCambioGuardado = () => {
    cargarEventos();
    cerrarTodo();
  };

  return (
    <div className="cal-wrap">
      {/* Toolbar */}
      <div className="cal-toolbar">
        <button className="btn btn-secondary btn-auto" style={{padding:'8px 12px'}} onClick={() => navMes(-1)}>‹</button>
        <span className="cal-toolbar-month">{MESES_ES[mes]} {año}</span>
        <button className="btn btn-secondary btn-auto" style={{padding:'8px 12px'}} onClick={() => navMes(1)}>›</button>
        <button className="btn btn-secondary btn-auto" style={{padding:'7px 12px',fontSize:12}}
          onClick={() => { setAnio(hoy.getFullYear()); setMes(hoy.getMonth()); }}>
          Hoy
        </button>
        <div className="cal-view-toggle">
          <button className={`cal-view-btn ${vista==='calendario'?'active':''}`} onClick={() => setVista('calendario')}>📅 Mes</button>
          <button className={`cal-view-btn ${vista==='agenda'?'active':''}`}     onClick={() => setVista('agenda')}>📋 Agenda</button>
        </div>
        {puede('crear_eventos') && (
          <button className="btn btn-primary btn-auto" style={{marginLeft:'auto',whiteSpace:'nowrap'}}
            onClick={() => setModalCrear(true)}>
            + Nuevo evento
          </button>
        )}
      </div>

      {/* Vista calendario — grid flat: 7 headers + N celdas como hijos directos */}
      {vista === 'calendario' && (
        <div className="evtcal-grid">
          {DIAS_ES.map((d, i) => (
            <div key={d} className={`evtcal-header${i >= 5 ? ' wknd' : ''}`}>{d}</div>
          ))}
          {grid.map(({ fecha, actual }) => {
            const evsDia    = eventosPorFecha[fecha] || [];
            const dia       = parseInt(fecha.slice(8), 10);
            const cumpleDia = (actual && fecha.slice(0,7) === `${año}-${String(mes+1).padStart(2,'0')}`)
                              ? cumplesPorDia[dia] || [] : [];
            const isToday   = fecha === todayStr;
            const dow       = new Date(fecha + 'T12:00:00').getDay();
            const isWeekend = dow === 0 || dow === 6;
            const cls = [
              'evtcal-cell',
              !actual    ? 'other-month' : '',
              isToday    ? 'today'       : '',
              isWeekend  ? 'weekend'     : '',
            ].filter(Boolean).join(' ');
            return (
              <div key={fecha} className={cls}>
                <div className="evtcal-num">{dia}</div>

                {/* Puntitos (mobile) */}
                <div className="evtcal-dots">
                  {evsDia.slice(0, 5).map(ev => (
                    <span key={ev.id}
                      className={`evtcal-dot${ev.estado !== 'activo' ? ' inactive' : ''}`}
                      style={{background: tipoColor(ev.tipo)}}
                      title={ev.titulo}
                      onClick={() => setModalDetalle(ev)}
                    />
                  ))}
                  {cumpleDia.length > 0 && (
                    <span className="evtcal-cumple" title={`🎂 ${cumpleDia.map(c=>c.nombre).join(', ')}`}
                      onClick={() => setModalCumple({ dia, lista: cumpleDia })} />
                  )}
                </div>

                {/* Chips (desktop) */}
                <div className="evtcal-chips">
                  {evsDia.slice(0, 2).map(ev => (
                    <span key={ev.id}
                      className={`evtcal-chip${ev.estado !== 'activo' ? ' inactive' : ''}`}
                      style={{background: tipoColor(ev.tipo)}}
                      title={ev.titulo}
                      onClick={() => setModalDetalle(ev)}>
                      {ev.titulo}
                    </span>
                  ))}
                  {cumpleDia.length > 0 && (
                    <span className="evtcal-chip" style={{background:'#ec4899',cursor:'pointer'}}
                      onClick={() => setModalCumple({ dia, lista: cumpleDia })}>
                      🎂 {cumpleDia.length === 1 ? cumpleDia[0].nombre.split(' ')[0] : `${cumpleDia.length} cumpleaños`}
                    </span>
                  )}
                  {evsDia.length > 2 && (
                    <span className="evtcal-more" onClick={() => setVista('agenda')}>
                      +{evsDia.length - 2} más
                    </span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Vista agenda */}
      {vista === 'agenda' && (
        <div>
          {eventosDelMes.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">📅</div>
              <div>No hay eventos en {MESES_ES[mes]}</div>
            </div>
          ) : (() => {
            // Agrupa por fecha
            const grupos = {};
            eventosDelMes.forEach(ev => {
              if (!grupos[ev.fecha]) grupos[ev.fecha] = [];
              grupos[ev.fecha].push(ev);
            });
            return Object.entries(grupos).map(([fecha, evs]) => (
              <div key={fecha}>
                <div className="agenda-group-date">
                  {new Date(fecha + 'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}
                </div>
                {evs.map(ev => (
                  <div key={ev.id} className="agenda-item" onClick={() => setModalDetalle(ev)}>
                    <div className="agenda-item-stripe" style={{background:tipoColor(ev.tipo)}} />
                    <div className="agenda-item-body">
                      <div className="agenda-item-titulo">{ev.titulo}</div>
                      <div className="agenda-item-meta">
                        <span style={{background:tipoColor(ev.tipo)+'22',color:tipoColor(ev.tipo),
                          borderRadius:8,padding:'1px 7px',fontSize:11,fontWeight:700}}>
                          {tipoLabel(ev.tipo)}
                        </span>
                        {ev.hora_inicio && <span>⏰ {formatHora(ev.hora_inicio)}{ev.hora_fin ? ` – ${formatHora(ev.hora_fin)}` : ''}</span>}
                        {ev.lugar && <span>📍 {ev.lugar}</span>}
                        {ev.alcance === 'institucion'
                          ? <span>🏫 Toda la institución</span>
                          : <span>👥 Cursos específicos</span>
                        }
                        <span className={`agenda-item-badge badge-${ev.estado}`}>
                          {ev.estado.charAt(0).toUpperCase() + ev.estado.slice(1)}
                        </span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ));
          })()}
        </div>
      )}

      {/* Modales */}
      {modalCrear && (
        <ModalEvento cursos={cursos} onClose={cerrarTodo} onGuardado={onGuardado} />
      )}
      {modalEditar && (
        <ModalEvento evento={modalEditar} cursos={cursos} onClose={cerrarTodo} onGuardado={onGuardado} />
      )}
      {modalDetalle && !modalCambio && (
        <ModalDetalleEvento evento={modalDetalle} cursos={cursos} user={user}
          onClose={cerrarTodo}
          onEditar={(ev) => { setModalDetalle(null); setModalEditar(ev); }}
          onCambio={(ev, modo) => setModalCambio({ evento: ev, modo })}
        />
      )}
      {modalCambio && (
        <ModalCambioEvento evento={modalCambio.evento} modo={modalCambio.modo}
          onClose={cerrarTodo} onGuardado={onCambioGuardado} />
      )}
      {modalCumple && (
        <div className="modal-overlay" onClick={() => setModalCumple(null)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">🎂 Cumpleaños del día {modalCumple.dia}</span>
              <button className="modal-close" onClick={() => setModalCumple(null)}>×</button>
            </div>
            {modalCumple.lista.map((c,i) => (
              <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:22}}>🎂</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>{c.nombre}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>
                    {c.tipo === 'docente' ? '👩‍🏫 Docente' : '👦 Estudiante'}
                    {c.fecha_nacimiento && ` · ${new Date().getFullYear() - parseInt(c.fecha_nacimiento.slice(0,4))} años`}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── EQUIPO DOCENTE ───────────────────────────────────────────────────────────────
// ── Modal para crear/vincular nuevo docente ──────────────────────────────────
function ModalNuevoDocente({ onClose, onCreado }) {
  const [modo,       setModo]      = useState('crear'); // 'crear' | 'vincular'
  const [nombre,     setNombre]    = useState('');
  const [email,      setEmail]     = useState('');
  const [password,   setPassword]  = useState('');
  const [showPwd,    setShowPwd]   = useState(false);
  const [usuarios,   setUsuarios]  = useState([]);  // para modo vincular
  const [selUsuario, setSelUsuario]= useState('');
  const [cargandoU,  setCargandoU] = useState(false);
  const [saving,     setSaving]    = useState(false);
  const [error,      setError]     = useState('');
  const [resultado,  setResultado] = useState(null); // {usuario_id, nombre, password_temporal?}

  // Carga usuarios sin ficha cuando se cambia a modo vincular
  useEffect(() => {
    if (modo !== 'vincular') return;
    setCargandoU(true);
    apiFetch('/api/docentes/usuarios-sin-ficha')
      .then(setUsuarios)
      .catch(e => setError(e.message))
      .finally(() => setCargandoU(false));
  }, [modo]);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setSaving(true);
    try {
      const body = modo === 'crear'
        ? { modo: 'crear', nombre, email, password: password || undefined }
        : { modo: 'vincular', vincular_usuario_id: selUsuario };

      const data = await apiFetch('/api/docentes', { method: 'POST', body });
      setResultado(data);
    } catch(err) {
      setError(err.message);
    } finally {
      setSaving(false);
    }
  };

  // Pantalla de éxito — muestra contraseña temporal si la hay y permite ir a la ficha
  if (resultado) {
    return (
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth:420}}>
          <div className="modal-header">
            <span className="modal-title">✅ Profe {resultado.modo === 'creado' ? 'creado' : 'vinculado'}</span>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
          <div className="alert alert-success" style={{marginBottom:12}}>
            <strong>{resultado.nombre}</strong> fue {resultado.modo === 'creado' ? 'agregado al sistema' : 'vinculado'} correctamente.
          </div>
          {resultado.password_temporal && (
            <div style={{background:'var(--bg3)',border:'1.5px solid var(--border)',borderRadius:10,padding:14,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:6}}>
                🔑 Contraseña temporal — guardala ahora
              </div>
              <div style={{fontFamily:'monospace',fontSize:17,fontWeight:800,letterSpacing:2,
                           background:'var(--bg2)',borderRadius:7,padding:'8px 12px',
                           display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>{resultado.password_temporal}</span>
                <button className="btn btn-secondary btn-auto" style={{fontSize:12,padding:'4px 8px'}}
                  onClick={() => navigator.clipboard?.writeText(resultado.password_temporal)}>
                  Copiar
                </button>
              </div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:6}}>
                El profe deberá cambiarla desde su perfil. Email: <strong>{resultado.email}</strong>
              </div>
            </div>
          )}
          <div className="modal-footer">
            <button className="btn btn-secondary btn-auto" onClick={onClose}>Cerrar</button>
            <button className="btn btn-primary btn-auto" onClick={() => onCreado(resultado.usuario_id)}>
              Abrir ficha del profe →
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">👩‍🏫 Nuevo profe</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        {/* Toggle modo */}
        <div className="alcance-btns" style={{marginBottom:18}}>
          <button type="button" className={`alcance-btn ${modo==='crear'?'selected':''}`}
            onClick={() => { setModo('crear'); setError(''); }}>
            ✨ Crear usuario nuevo
          </button>
          <button type="button" className={`alcance-btn ${modo==='vincular'?'selected':''}`}
            onClick={() => { setModo('vincular'); setError(''); }}>
            🔗 Vincular usuario existente
          </button>
        </div>

        {error && <div className="alert alert-error">{error}</div>}

        <form onSubmit={submit}>
          {modo === 'crear' ? (
            <>
              <div className="form-group">
                <label className="form-label">Nombre completo *</label>
                <input className="form-control" value={nombre} required
                  onChange={e => setNombre(e.target.value)}
                  placeholder="Ej: María González" />
              </div>
              <div className="form-group">
                <label className="form-label">Email *</label>
                <input className="form-control" type="email" value={email} required
                  onChange={e => setEmail(e.target.value)}
                  placeholder="profe@ejemplo.com" />
              </div>
              <div className="form-group">
                <label className="form-label">
                  Contraseña temporal
                  <span style={{fontWeight:400,color:'var(--text2)',fontSize:11,marginLeft:6}}>
                    (se auto-genera si la dejás vacía)
                  </span>
                </label>
                <div style={{display:'flex',gap:6}}>
                  <input className="form-control" type={showPwd ? 'text' : 'password'}
                    value={password} onChange={e => setPassword(e.target.value)}
                    placeholder="Mínimo 6 caracteres o dejar vacío" />
                  <button type="button" className="btn btn-secondary btn-auto" style={{flexShrink:0,padding:'0 12px'}}
                    onClick={() => setShowPwd(s => !s)}>
                    {showPwd ? '🙈' : '👁'}
                  </button>
                </div>
              </div>
              <div className="alert alert-warning" style={{fontSize:12}}>
                Se creará un usuario con rol <strong>Docente</strong>. Podés completar los demás datos (DNI, instrumentos, etc.) en la ficha.
              </div>
            </>
          ) : (
            <>
              <div className="form-group">
                <label className="form-label">Seleccioná el usuario a vincular *</label>
                {cargandoU ? (
                  <div style={{fontSize:13,color:'var(--text2)'}}>Cargando usuarios...</div>
                ) : usuarios.length === 0 ? (
                  <div className="alert alert-warning" style={{fontSize:13}}>
                    Todos los usuarios ya tienen ficha docente, o no hay usuarios sin asignar. Podés crear uno nuevo desde la otra pestaña.
                  </div>
                ) : (
                  <select className="form-control" value={selUsuario} required
                    onChange={e => setSelUsuario(e.target.value)}>
                    <option value="">— Seleccioná un usuario —</option>
                    {usuarios.map(u => (
                      <option key={u.id} value={u.id}>
                        {u.nombre} ({u.email}) — {u.rol_nombre}
                      </option>
                    ))}
                  </select>
                )}
              </div>
              <div className="alert alert-warning" style={{fontSize:12}}>
                Se creará una ficha docente para este usuario. Su usuario y contraseña no cambian.
              </div>
            </>
          )}

          <div className="modal-footer">
            <button type="button" className="btn btn-secondary btn-auto" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn-primary btn-auto" disabled={saving ||
              (modo === 'vincular' && (usuarios.length === 0 || !selUsuario))}>
              {saving ? 'Guardando...' : modo === 'crear' ? '+ Crear profe' : '🔗 Vincular'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function Docentes({ user }) {
  const puede = (p) => user.permisos?.includes(p);
  const [lista,       setLista]      = useState([]);
  const [instrumentos,setInstrumentos]= useState([]);
  const [cursos,      setCursos]     = useState([]);
  const [busqueda,    setBusqueda]   = useState('');
  const [filtroInst,  setFiltroInst] = useState('');
  const [ficha,       setFicha]      = useState(null);
  const [cargando,    setCargando]   = useState(true);
  const [modalNuevo,  setModalNuevo] = useState(false);

  const cargarLista = useCallback(async () => {
    try { setLista(await apiFetch('/api/docentes')); } catch(e) {}
  }, []);

  useEffect(() => {
    Promise.all([
      apiFetch('/api/docentes'),
      apiFetch('/api/instrumentos'),
      apiFetch('/api/cursos'),
    ]).then(([d, i, c]) => { setLista(d); setInstrumentos(i); setCursos(c); })
      .catch(() => {})
      .finally(() => setCargando(false));
  }, []);

  const cargarFicha = async (usuarioId) => {
    try {
      const d = await apiFetch(`/api/docentes/${usuarioId}`);
      setFicha(d);
    } catch(e) { alert(e.message); }
  };

  const listaFiltrada = lista.filter(d => {
    const txt = `${d.nombre} ${d.instrumentos_nombres||''}`.toLowerCase();
    if (busqueda && !txt.includes(busqueda.toLowerCase())) return false;
    if (filtroInst && !(d.instrumentos_nombres||'').includes(filtroInst)) return false;
    return true;
  });

  if (ficha) return (
    <FichaDocente ficha={ficha} instrumentos={instrumentos} cursos={cursos}
      user={user} puede={puede}
      onVolver={() => { setFicha(null); cargarLista(); }}
    />
  );

  return (
    <div>
      <div className="section-header">
        <h2 style={{fontSize:18,fontWeight:800}}>👩‍🏫 Equipo Docente</h2>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span className="badge-count">{listaFiltrada.length} profes</span>
          {puede('editar_equipo_docente') && (
            <button className="btn btn-primary btn-auto" onClick={() => setModalNuevo(true)}>
              + Nuevo profe
            </button>
          )}
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <input className="form-control" style={{flex:1,minWidth:160}}
          placeholder="Buscar por nombre o instrumento..."
          value={busqueda} onChange={e => setBusqueda(e.target.value)} />
        <select className="form-control" style={{width:'auto'}} value={filtroInst}
          onChange={e => setFiltroInst(e.target.value)}>
          <option value="">Todos los instrumentos</option>
          {instrumentos.map(i => <option key={i.id} value={i.nombre}>{i.nombre}</option>)}
        </select>
      </div>
      {cargando ? <div className="spinner"><div className="spin" /></div>
        : listaFiltrada.length === 0
        ? (
          <div className="empty-state">
            <div className="empty-state-icon">👩‍🏫</div>
            <div>No hay profes registrados</div>
            {puede('editar_equipo_docente') && (
              <button className="btn btn-primary btn-auto" style={{marginTop:12}}
                onClick={() => setModalNuevo(true)}>
                + Agregar el primer profe
              </button>
            )}
          </div>
        )
        : listaFiltrada.map(d => {
            const iniciales = d.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
            return (
              <div key={d.usuario_id} className="docente-card" onClick={() => cargarFicha(d.usuario_id)}>
                <div className="docente-avatar">
                  {d.foto_path ? <img src={d.foto_path} alt={d.nombre} /> : iniciales}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="docente-nombre">{d.nombre}</div>
                  <div className="docente-meta">
                    {d.instrumentos_nombres
                      ? d.instrumentos_nombres.split(',').map((i,k) => (
                          <span key={k} style={{background:'var(--bg3)',borderRadius:8,padding:'1px 7px',fontSize:11,fontWeight:600}}>{i.trim()}</span>
                        ))
                      : <span style={{color:'var(--text2)'}}>Sin instrumentos cargados</span>
                    }
                    {d.cursos_nombres && <span>· {d.cursos_nombres}</span>}
                  </div>
                </div>
              </div>
            );
          })
      }
      {modalNuevo && (
        <ModalNuevoDocente
          onClose={() => setModalNuevo(false)}
          onCreado={(usuarioId) => {
            setModalNuevo(false);
            cargarLista();
            cargarFicha(usuarioId);
          }}
        />
      )}
    </div>
  );
}

function FichaDocente({ ficha, instrumentos, cursos, user, puede, onVolver }) {
  const esPropio = user.id === ficha.usuario_id;
  const puedeEd  = puede('editar_equipo_docente') || esPropio;
  const [form,    setForm]    = useState({
    dni:              ficha.dni || '',
    fecha_nacimiento: ficha.fecha_nacimiento || '',
    telefono:         ficha.telefono || '',
    formacion:        ficha.formacion || '',
    instrumento_ids:  (ficha.instrumentos || []).map(i => i.id),
  });
  const [saving, setSaving]  = useState(false);
  const [msg,    setMsg]     = useState('');
  const [foto,   setFoto]    = useState(ficha.foto_path);

  const set = (k, v) => setForm(f => ({...f, [k]:v}));
  const toggleInst = (id) => set('instrumento_ids', form.instrumento_ids.includes(id)
    ? form.instrumento_ids.filter(x=>x!==id) : [...form.instrumento_ids, id]);

  const guardar = async (e) => {
    e.preventDefault(); setSaving(true); setMsg('');
    try {
      await apiFetch(`/api/docentes/${ficha.usuario_id}`, { method:'PUT', body: form });
      setMsg('Ficha actualizada correctamente.');
    } catch(err) { setMsg('Error: ' + err.message); }
    finally { setSaving(false); }
  };

  const subirFoto = async (file) => {
    if (!file) return;
    const fd = new FormData();
    fd.append('foto', file);
    const token = localStorage.getItem('epm_token');
    const res = await fetch(`/api/docentes/${ficha.usuario_id}/foto`, {
      method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:fd,
    });
    const d = await res.json();
    if (res.ok) setFoto(d.foto_path);
    else alert(d.error);
  };

  const iniciales = ficha.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();

  return (
    <div style={{maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
        <button className="btn btn-secondary btn-auto" onClick={onVolver}>← Volver</button>
        <h2 style={{fontSize:18,fontWeight:800}}>Ficha docente</h2>
      </div>
      <div className="ficha-section">
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
          <label style={{cursor: puedeEd ? 'pointer' : 'default', position:'relative'}}>
            <div className="docente-avatar" style={{width:60,height:60,fontSize:22,borderRadius:14}}>
              {foto ? <img src={foto} alt={ficha.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                    : iniciales}
            </div>
            {puedeEd && <input type="file" accept="image/*" style={{display:'none'}}
              onChange={e => e.target.files[0] && subirFoto(e.target.files[0])} />}
          </label>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>{ficha.nombre}</div>
            <div style={{fontSize:13,color:'var(--text2)'}}>{ficha.email}</div>
            {ficha.cursos?.length > 0 && (
              <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>
                Cursos: {ficha.cursos.map(c=>c.nombre).join(', ')}
              </div>
            )}
          </div>
        </div>
      </div>
      {msg && <div className={`alert ${msg.startsWith('Error') ? 'alert-error' : 'alert-success'}`}>{msg}</div>}
      <form onSubmit={guardar}>
        <div className="ficha-section">
          <div className="ficha-section-title">Datos personales</div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">DNI</label>
              <input className="form-control" value={form.dni} disabled={!puedeEd}
                onChange={e => set('dni', e.target.value)} placeholder="12345678" />
            </div>
            <div className="form-group">
              <label className="form-label">Fecha de nacimiento</label>
              <input className="form-control" type="date" value={form.fecha_nacimiento} disabled={!puedeEd}
                onChange={e => set('fecha_nacimiento', e.target.value)} />
            </div>
            <div className="form-group col-full">
              <label className="form-label">Teléfono</label>
              <input className="form-control" value={form.telefono} disabled={!puedeEd}

            </div>
          </div>
        </div>
        <div className="ficha-section">
          <div className="ficha-section-title">Instrumentos que enseña</div>
          <div className="curso-checks">
            {instrumentos.map(i => (
              <button key={i.id} type="button" disabled={!puedeEd}
                className={`curso-check-btn ${form.instrumento_ids.includes(i.id) ? 'selected' : ''}`}
                onClick={() => puedeEd && toggleInst(i.id)}>
                {i.nombre}
              </button>
            ))}

        </div>
        <div className="ficha-section">
          <div className="ficha-section-title">Formación y experiencia</div>
          <textarea className="form-control" rows={5} value={form.formacion} disabled={!puedeEd}

        {puedeEd && (
          <div style={{display:'flex',justifyContent:'flex-end',padding:'6px 0'}}>

            </button>
          </div>
        )}
      </form>

  );
