<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EPM – Sistema de Gestión Escolar</title>
  <link rel="icon" type="image/jpeg" href="/logo-epm.jpg" />
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    /* ── VARIABLES ─────────────────────────────────────────────────────────── */
    :root {
      --sidebar-w: 256px;
      --bg:        #f0f2ff;
      --bg2:       #ffffff;
      --bg3:       #e8ebff;
      --sidebar:   #1e1b4b;
      --sidebar2:  #312e81;
      --primary:   #6366f1;
      --primary-d: #4f46e5;
      --primary-l: #a5b4fc;
      --accent:    #8b5cf6;
      --text:      #1e1b4b;
      --text2:     #6b7280;
      --text-inv:  #ffffff;
      --border:    #c7d2fe;
      --danger:    #ef4444;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --card:      #ffffff;
      --shadow:    0 2px 8px rgba(99,102,241,.12);
      --radius:    12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#0f0e1a; --bg2:#1a1830; --bg3:#252344;
        --sidebar:#0a0918; --sidebar2:#1a1830;
        --primary:#818cf8; --primary-d:#6366f1; --primary-l:#4f46e5;
        --accent:#a78bfa; --text:#e2e8f0; --text2:#94a3b8;
        --border:#2d2b54; --card:#1a1830;
        --shadow:0 2px 12px rgba(0,0,0,.4);
      }
    }

    /* ── RESET ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh; }
    #root { min-height:100vh; }

    /* ── LAYOUT ────────────────────────────────────────────────────────────── */
    .layout { display:flex; min-height:100vh; }
    .main   { margin-left:var(--sidebar-w); flex:1; display:flex;
               flex-direction:column; min-height:100vh; }

    /* ── SIDEBAR ───────────────────────────────────────────────────────────── */
    .sidebar {
      width:var(--sidebar-w); background:var(--sidebar); color:var(--text-inv);
      display:flex; flex-direction:column; position:fixed; height:100vh;
      z-index:200; transition:transform .3s;
    }
    .sidebar-logo        { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.1); display:flex; align-items:center; gap:12px; }
    .sidebar-logo-img    { background:#fff; border-radius:8px; padding:4px; flex-shrink:0; }
    .sidebar-logo-img img{ width:40px; height:40px; object-fit:contain; display:block; }
    .sidebar-logo h1     { font-size:19px; font-weight:800; color:var(--primary-l); }
    .sidebar-logo p      { font-size:11px; color:rgba(255,255,255,.45); margin-top:2px; }
    .sidebar-nav    { flex:1; padding:12px 0; overflow-y:auto; }

    .nav-item {
      display:flex; align-items:center; gap:10px; padding:11px 18px;
      cursor:pointer; color:rgba(255,255,255,.65); font-size:14px; font-weight:500;
      border-left:3px solid transparent; transition:all .18s; user-select:none;
    }
    .nav-item:hover  { background:rgba(255,255,255,.07); color:#fff; }
    .nav-item.active { background:rgba(99,102,241,.25); color:var(--primary-l);
                       border-left-color:var(--primary-l); }
    .nav-icon  { font-size:17px; width:22px; text-align:center; flex-shrink:0; }

    .sidebar-user {
      padding:14px 18px; border-top:1px solid rgba(255,255,255,.1);
      display:flex; align-items:center; gap:10px;
    }
    .user-avatar {
      width:34px; height:34px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:13px; color:#fff;
    }
    .user-info  { flex:1; min-width:0; }
    .user-name  { font-size:13px; font-weight:600; color:#fff;
                  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .user-role  { font-size:11px; color:rgba(255,255,255,.45); }
    .btn-logout { background:none; border:none; cursor:pointer; font-size:17px;
                  color:rgba(255,255,255,.35); padding:4px; }
    .btn-logout:hover { color:var(--danger); }

    .sidebar-overlay { display:none; position:fixed; inset:0;
                       background:rgba(0,0,0,.45); z-index:199; }

    /* ── TOPBAR ────────────────────────────────────────────────────────────── */
    .topbar {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:14px 24px; display:flex; align-items:center; gap:12px;
      position:sticky; top:0; z-index:100;
    }
    .topbar-menu  { background:none; border:none; font-size:21px; cursor:pointer;
                    color:var(--text); display:none; padding:2px 6px; }
    .topbar-title { font-size:18px; font-weight:700; color:var(--text); }

    /* ── PAGE ──────────────────────────────────────────────────────────────── */
    .page { padding:24px; flex:1; }

    /* ── CARD ──────────────────────────────────────────────────────────────── */
    .card       { background:var(--card); border-radius:var(--radius);
                  box-shadow:var(--shadow); padding:24px; border:1px solid var(--border); }
    .card-title { font-size:15px; font-weight:700; margin-bottom:16px;
                  display:flex; align-items:center; gap:8px; }

    /* ── DASHBOARD ─────────────────────────────────────────────────────────── */
    .dash-welcome {
      background:linear-gradient(135deg,var(--primary),var(--accent));
      border-radius:var(--radius); padding:24px; color:#fff; margin-bottom:20px;
    }
    .dash-welcome h2 { font-size:20px; font-weight:800; }
    .dash-welcome p  { font-size:13px; opacity:.85; margin-top:4px; }
    .modules-grid    { display:grid;
                       grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
    .module-card {
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px; cursor:pointer; transition:all .18s; text-align:center;
    }
    .module-card:hover { border-color:var(--primary); box-shadow:var(--shadow);
                         transform:translateY(-2px); }
    .module-icon  { font-size:28px; margin-bottom:8px; }
    .module-label { font-size:13px; font-weight:600; }

    /* ── PLACEHOLDER ───────────────────────────────────────────────────────── */
    .placeholder {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:64px 24px; text-align:center; gap:16px;
    }
    .placeholder-icon  { font-size:56px; }
    .placeholder-title { font-size:22px; font-weight:800; }
    .placeholder-sub   { font-size:14px; color:var(--text2); max-width:320px; line-height:1.6; }
    .badge-wip {
      background:var(--bg3); color:var(--text2); border:1px solid var(--border);
      border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600;
    }

    /* ── LOGIN ─────────────────────────────────────────────────────────────── */
    .login-page {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4c1d95 100%); padding:20px;
    }
    .login-card {
      background:var(--card); border-radius:20px; padding:40px;
      width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .login-logo        { text-align:center; margin-bottom:32px; }
    .login-logo img    { width:130px; height:auto; margin-bottom:12px; display:block; margin-left:auto; margin-right:auto; }
    .login-logo h1     { font-size:30px; font-weight:900;
                         background:linear-gradient(135deg,var(--primary),var(--accent));
                         -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .login-logo p      { font-size:13px; color:var(--text2); margin-top:4px; }
    .login-error   { background:#fee2e2; color:var(--danger); padding:10px 14px;
                     border-radius:8px; font-size:13px; margin-bottom:14px; }

    /* ── FORM ──────────────────────────────────────────────────────────────── */
    .form-group   { margin-bottom:14px; }
    .form-label   { display:block; font-size:12px; font-weight:600;
                    color:var(--text2); margin-bottom:5px; }
    .form-control {
      width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px;
      background:var(--bg); color:var(--text); font-size:14px; outline:none;
      transition:border-color .2s;
    }
    .form-control:focus { border-color:var(--primary); }

    /* ── BUTTON ────────────────────────────────────────────────────────────── */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600;
      border:none; cursor:pointer; transition:all .18s; width:100%;
    }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-d); }
    .btn:disabled { opacity:.55; cursor:not-allowed; }

    /* ── SPINNER ───────────────────────────────────────────────────────────── */
    .spinner { display:flex; align-items:center; justify-content:center; padding:48px; }
    .spin    { width:30px; height:30px; border:3px solid var(--border);
               border-top-color:var(--primary); border-radius:50%;
               animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── MOBILE ────────────────────────────────────────────────────────────── */
    @media (max-width:768px) {
      .sidebar              { transform:translateX(-100%); }
      .sidebar.open         { transform:translateX(0); }
      .sidebar-overlay.open { display:block; }
      .main                 { margin-left:0; }
      .topbar-menu          { display:block; }
      .page                 { padding:16px; }
      .modules-grid         { grid-template-columns:1fr 1fr; }
    }

    /* ── BOTONES SECUNDARIO / PELIGRO ──────────────────────────────────────── */
    .btn-secondary       { background:var(--bg3); color:var(--text); border:1.5px solid var(--border); }
    .btn-secondary:hover { background:var(--border); }
    .btn-danger          { background:var(--danger); color:#fff; border:none; }
    .btn-danger:hover    { opacity:.85; }
    .btn-auto            { width:auto; }

    /* ── MODAL ──────────────────────────────────────────────────────────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:300;
                     display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal         { background:var(--card); border-radius:var(--radius); padding:24px;
                     width:100%; max-width:460px; max-height:90vh; overflow-y:auto;
                     box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .modal-header  { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .modal-title   { font-size:16px; font-weight:700; }
    .modal-close   { background:none; border:none; font-size:20px; cursor:pointer;
                     color:var(--text2); padding:2px 8px; border-radius:6px; line-height:1; }
    .modal-close:hover { background:var(--bg3); color:var(--text); }
    .modal-footer  { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }

    /* ── ALERTS ─────────────────────────────────────────────────────────────── */
    .alert         { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; line-height:1.5; }
    .alert-success { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    .alert-error   { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .alert-warning { background:#fef9c3; color:#854d0e; border:1px solid #fde047; }

    /* ── LISTA DE CURSOS ────────────────────────────────────────────────────── */
    .list-row {
      display:flex; align-items:center; gap:12px; padding:14px 16px;
      border:1.5px solid var(--border); border-radius:var(--radius);
      background:var(--card); margin-bottom:8px; transition:border-color .18s;
    }
    .list-row:hover       { border-color:var(--primary-l); }
    .list-row-label       { flex:1; font-size:15px; font-weight:600; }
    .badge-count          { background:var(--bg3); color:var(--text2); border:1px solid var(--border);
                            border-radius:20px; padding:3px 10px; font-size:12px; font-weight:600; white-space:nowrap; }
    .row-actions          { display:flex; gap:6px; flex-shrink:0; }
    .btn-icon             { background:none; border:1.5px solid var(--border); border-radius:8px;
                            padding:6px 10px; cursor:pointer; font-size:14px; color:var(--text2);
                            transition:all .18s; line-height:1; }
    .btn-icon:hover             { border-color:var(--primary); color:var(--primary); background:var(--bg3); }
    .btn-icon-danger:hover      { border-color:var(--danger) !important; color:var(--danger) !important; background:#fee2e2 !important; }
    .section-header       { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .empty-state          { text-align:center; padding:40px 0; color:var(--text2); }
    .empty-state-icon     { font-size:40px; margin-bottom:8px; }

    /* ── FICHA DE ESTUDIANTE ────────────────────────────────────────────────── */
    .ficha-wrap     { max-width:700px; margin:0 auto; }
    .ficha-section  {
      background:var(--card); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:20px; margin-bottom:14px;
      box-shadow:var(--shadow);
    }
    .ficha-section-title {
      font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
      color:var(--text2); margin-bottom:16px; padding-bottom:10px;
      border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px;
    }
    .ficha-autorizaciones { background:linear-gradient(135deg,#fffbeb,#fef3c7); border-color:#f59e0b !important; }
    .ficha-autorizaciones .ficha-section-title { color:#92400e; border-bottom-color:#fde68a; }
    @media (prefers-color-scheme:dark) {
      .ficha-autorizaciones { background:linear-gradient(135deg,#2d1f08,#3d2a0a); border-color:#b45309 !important; }
      .ficha-autorizaciones .ficha-section-title { color:#fbbf24; border-bottom-color:#78350f; }
    }
    .form-grid  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .col-full   { grid-column:1/-1; }

    .auth-list  { display:flex; flex-direction:column; gap:8px; }
    .auth-row {
      display:flex; align-items:center; gap:14px; padding:14px 16px;
      background:rgba(255,255,255,.75); border-radius:10px; cursor:pointer;
      border:2px solid transparent; transition:all .18s; user-select:none;
    }
    .auth-row:hover { border-color:#fbbf24; background:rgba(255,255,255,.95); }
    .auth-row.on    { border-color:#22c55e; background:rgba(240,253,244,.9); }
    @media (prefers-color-scheme:dark) {
      .auth-row { background:rgba(255,255,255,.07); }
      .auth-row:hover { background:rgba(255,255,255,.12); }
      .auth-row.on { background:rgba(20,83,45,.4); }
    }
    .auth-check {
      width:28px; height:28px; border-radius:7px; border:2.5px solid #d1d5db; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:17px; font-weight:700; background:#fff; transition:all .18s;
    }
    .auth-row.on .auth-check { background:#22c55e; border-color:#22c55e; color:#fff; }
    .auth-label { font-size:15px; font-weight:700; color:var(--text); line-height:1.2; }
    .auth-sub   { font-size:11px; color:var(--text2); margin-top:2px; }

    .dirty-bar {
      display:flex; align-items:center; gap:8px; padding:9px 14px; margin-bottom:12px;
      background:#fff7ed; border:1px solid #fed7aa; border-radius:8px;
      font-size:13px; font-weight:600; color:#9a3412;
    }
    .ficha-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .ficha-avatar {
      width:50px; height:50px; border-radius:13px; flex-shrink:0;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      display:flex; align-items:center; justify-content:center;
      font-size:19px; font-weight:800; color:#fff;
    }
    .ficha-meta h2 { font-size:18px; font-weight:800; line-height:1.2; }
    .ficha-meta p  { font-size:12px; color:var(--text2); margin-top:3px; }
    .ficha-footer  { display:flex; gap:8px; padding:6px 0 4px; flex-wrap:wrap; }

    /* ── LISTA DE ESTUDIANTES ───────────────────────────────────────────────── */
    .curso-tabs { display:flex; gap:6px; overflow-x:auto; margin-bottom:14px; scrollbar-width:none; padding-bottom:2px; }
    .curso-tabs::-webkit-scrollbar { display:none; }
    .curso-tab {
      padding:7px 16px; border-radius:20px; font-size:13px; font-weight:600;
      cursor:pointer; white-space:nowrap; border:1.5px solid var(--border);
      background:var(--card); color:var(--text2); transition:all .18s; flex-shrink:0;
    }
    .curso-tab:hover:not(.active) { border-color:var(--primary); color:var(--primary); }
    .curso-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .est-row {
      display:flex; align-items:center; gap:12px; padding:11px 14px;
      border:1.5px solid var(--border); border-radius:var(--radius);
      background:var(--card); margin-bottom:6px; transition:all .18s;
    }
    .est-row:hover { border-color:var(--primary-l); }
    .est-avatar {
      width:38px; height:38px; border-radius:10px; flex-shrink:0;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:800; color:#fff;
    }
    .est-nombre { font-size:14px; font-weight:700; }
    .est-sub    { font-size:11px; color:var(--text2); margin-top:1px; }
    .est-tag    {
      font-size:11px; font-weight:600; background:var(--bg3); color:var(--primary);
      border-radius:12px; padding:2px 9px; white-space:nowrap; flex-shrink:0;
    }

    /* ── FOTO ───────────────────────────────────────────────────────────────── */
    .foto-avatar-wrap {
      width:50px; height:50px; border-radius:13px; flex-shrink:0; cursor:pointer;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      display:flex; align-items:center; justify-content:center;
      font-size:19px; font-weight:800; color:#fff; overflow:hidden; position:relative;
    }
    .foto-avatar-wrap:hover::after {
      content:'📷'; position:absolute; inset:0; background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center; font-size:22px;
    }
    .foto-avatar-wrap img { width:100%; height:100%; object-fit:cover; }
    .foto-hint  { font-size:10px; color:var(--text2); margin-top:3px; }

    /* ── BULK / SELECCIÓN ───────────────────────────────────────────────────── */
    .est-check {
      width:22px; height:22px; border-radius:5px; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      flex-shrink:0; transition:all .15s; background:var(--bg); font-size:13px;
    }
    .est-check.on { background:var(--primary); border-color:var(--primary); color:#fff; }
    .est-row.sel  { border-color:var(--primary); background:var(--bg3); }
    .bulk-bar {
      display:flex; align-items:center; gap:8px; padding:10px 14px; flex-wrap:wrap;
      background:var(--bg3); border:1.5px solid var(--primary-l);
      border-radius:var(--radius); margin-bottom:10px;
    }
    .bulk-count { font-size:13px; font-weight:700; color:var(--primary); flex:1; }

    /* ── TOMAR ASISTENCIA ───────────────────────────────────────────────────── */
    .asis-row {
      padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius);
      background:var(--card); margin-bottom:8px;
      display:flex; flex-direction:column; gap:10px; transition:all .15s;
    }
    .asis-row-presente { border-color:#86efac; background:#f0fdf4; }
    .asis-row-ausente  { border-color:#fca5a5; background:#fef2f2; }
    .asis-row-tarde    { border-color:#93c5fd; background:#eff6ff; }
    @media (prefers-color-scheme:dark) {
      .asis-row-presente { background:rgba(20,83,45,.22); }
      .asis-row-ausente  { background:rgba(127,29,29,.22); }
      .asis-row-tarde    { background:rgba(30,58,138,.22); }
    }
    .asis-nombre { font-size:15px; font-weight:700; }
    .asis-btns   { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
    .asis-btn {
      padding:14px 6px; border:2px solid var(--border); border-radius:10px;
      font-size:13px; font-weight:700; cursor:pointer; text-align:center;
      background:var(--bg3); color:var(--text2); transition:all .15s;
      -webkit-tap-highlight-color:transparent; user-select:none;
    }
    .asis-btn:active { opacity:.75; transform:scale(.97); }
    .asis-btn.asis-presente.sel { background:#dcfce7; border-color:#22c55e; color:#166534; }
    .asis-btn.asis-ausente.sel  { background:#fee2e2; border-color:#ef4444; color:#991b1b; }
    .asis-btn.asis-tarde.sel    { background:#dbeafe; border-color:#3b82f6; color:#1e40af; }
    .asis-obs {
      width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:6px;
      font-size:12px; background:var(--bg); color:var(--text); font-family:inherit;
    }
    .asis-obs:focus { outline:none; border-color:var(--primary); }
    .asis-counter {
      display:flex; align-items:center; gap:14px; flex-wrap:wrap;
      padding:10px 14px; background:var(--bg3); border-radius:10px;
      margin-bottom:10px; font-size:13px; font-weight:700;
    }
    .asis-success {
      background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff;
      border-radius:var(--radius); padding:32px 24px; text-align:center;
    }
    .asis-success h3 { font-size:22px; font-weight:800; margin-bottom:4px; }

    /* ── IMPORTAR CSV ───────────────────────────────────────────────────────── */
    .import-drop {
      border:2px dashed var(--border); border-radius:var(--radius);
      padding:28px 16px; text-align:center; cursor:pointer; transition:all .2s;
      background:var(--bg); display:flex; flex-direction:column; align-items:center; gap:6px;
    }
    .import-drop:hover, .import-drop.over { border-color:var(--primary); background:var(--bg3); }
    .import-drop p { font-size:13px; color:var(--text2); margin:0; }
    .preview-scroll { overflow:auto; max-height:280px; border-radius:8px; border:1px solid var(--border); }
    .preview-table  { width:100%; border-collapse:collapse; font-size:12px; }
    .preview-table th { background:var(--bg3); padding:6px 8px; text-align:left; font-size:11px;
                        font-weight:700; text-transform:uppercase; white-space:nowrap; }
    .preview-table td { padding:5px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
    .preview-table tr.pr-ok   td { background:#f0fdf4; }
    .preview-table tr.pr-err  td { background:#fef2f2; }
    .pr-error-msg { color:var(--danger); font-size:11px; }

    /* ── REPORTES ───────────────────────────────────────────────────────────── */
    .report-stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:16px; }
    .rstat        { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .rstat-value  { font-size:28px; font-weight:800; color:var(--primary); line-height:1; }
    .rstat-label  { font-size:12px; color:var(--text2); margin-top:6px; }
    .rstat-alert  .rstat-value { color:var(--warning); }
    .rstat-danger .rstat-value { color:var(--danger); }

    .rpt-table    { width:100%; border-collapse:collapse; font-size:14px; }
    .rpt-th       { background:var(--bg3); padding:10px 12px; text-align:left; font-size:11px;
                    font-weight:700; text-transform:uppercase; letter-spacing:.05em;
                    white-space:nowrap; border-bottom:1px solid var(--border); }
    .rpt-th:hover { background:var(--border); }
    .rpt-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
    .rpt-table tr:last-child td { border-bottom:none; }
    .rpt-table tr:hover td      { background:var(--bg3); }
    .rpt-row-alerta td          { background:rgba(239,68,68,.04); }
    .rpt-nombre    { font-weight:600; }
    .rpt-num       { text-align:right; font-variant-numeric:tabular-nums; }
    .rpt-aus-alta  { color:var(--danger); font-weight:700; }
    .rpt-aus-media { color:var(--warning); font-weight:600; }
    .rpt-sin-datos { font-size:10px; color:var(--text2); margin-left:6px; font-weight:400; }
    .pie-legend    { font-size:13px; margin-bottom:5px; display:flex; align-items:center; gap:6px; }
    .pie-wrap      { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }

    .pct-badge { border-radius:6px; padding:3px 9px; font-weight:700; font-size:12px; }
    .pct-alta  { background:#dcfce7; color:#166534; }
    .pct-media { background:#fef9c3; color:#854d0e; }
    .pct-baja  { background:#fee2e2; color:#991b1b; }

    .print-header { display:none; margin-bottom:16px; }
    @media print {
      .no-print, .sidebar, .sidebar-overlay, .topbar { display:none !important; }
      .main          { margin-left:0 !important; }
      .page          { padding:10px !important; }
      .print-header  { display:block !important; }
      .rpt-table     { font-size:11px; }
      .card          { box-shadow:none; border:1px solid #ddd; }
    }

    @media (max-width:600px) {
      .form-grid   { grid-template-columns:1fr; }
      .ficha-footer{ flex-direction:column; }
      .ficha-footer .btn { width:100%; justify-content:center; }
    }

    /* ── USUARIOS Y ROLES ─────────────────────────────────────────────────────── */
    .usr-row    { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--card); margin-bottom:6px; transition:border-color .15s; }
    .usr-row:hover { border-color:var(--primary-l); }
    .usr-avatar { width:38px; height:38px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg,var(--accent),var(--primary)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; }
    .usr-nombre { font-size:14px; font-weight:700; }
    .usr-meta   { font-size:11px; color:var(--text2); margin-top:1px; }
    .usr-self   { font-size:10px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:1px 6px; color:var(--text2); margin-left:6px; font-weight:400; }
    .rol-badge  { display:inline-block; background:var(--bg3); color:var(--primary); border-radius:10px; padding:1px 8px; font-size:11px; font-weight:700; }
    .role-header { display:flex; align-items:center; gap:10px; padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--card); cursor:pointer; user-select:none; margin-bottom:2px; transition:all .15s; }
    .role-header:hover  { border-color:var(--primary-l); }
    .role-header.open   { border-color:var(--primary); border-bottom-left-radius:0; border-bottom-right-radius:0; }
    .role-body  { padding:16px; border:1.5px solid var(--primary); border-top:none; border-bottom-left-radius:var(--radius); border-bottom-right-radius:var(--radius); background:var(--card); margin-bottom:10px; }
    .role-sistema { font-size:10px; background:#ede9fe; color:#5b21b6; border-radius:10px; padding:1px 7px; font-weight:700; flex-shrink:0; }
    .perm-group { margin-bottom:14px; }
    .perm-group-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text2); margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
    .perm-grid  { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .perm-item  { display:flex; align-items:flex-start; gap:8px; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:all .15s; user-select:none; }
    .perm-item:hover   { border-color:var(--primary-l); }
    .perm-item.on      { border-color:var(--primary); background:rgba(99,102,241,.06); }
    .perm-chk   { width:18px; height:18px; border-radius:4px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; margin-top:1px; transition:all .15s; }
    .perm-item.on .perm-chk { background:var(--primary); border-color:var(--primary); color:#fff; }
    .perm-desc  { font-size:12px; color:var(--text); line-height:1.3; }

    @media (max-width:600px) {
      .perm-grid { grid-template-columns:1fr; }
    }

    /* ── MEJORAS MÓVIL GENERAL ──────────────────────────────────────────────── */
    @media (max-width:480px) {
      .section-header { flex-wrap:wrap; gap:8px; }
      .report-stats   { grid-template-columns:1fr 1fr; }
      .modules-grid   { grid-template-columns:1fr 1fr; }
      .modal          { padding:18px; }
    }

    /* ── PLANIFICACIONES ────────────────────────────────────────────────────── */
    .plan-item     { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
    .plan-item:hover { border-color:var(--primary-l); }
    .plan-item-hd  { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .plan-titulo   { font-size:15px; font-weight:700; }
    .plan-meta     { font-size:12px; color:var(--text2); margin-top:2px; }
    .plan-detail-hd  { display:flex; align-items:center; gap:10px; padding:10px 0 14px; border-bottom:1px solid var(--border); margin-bottom:16px; flex-wrap:wrap; }
    .plan-detail-title { font-size:18px; font-weight:800; line-height:1.2; }
    .plan-detail-meta  { font-size:12px; color:var(--text2); margin-top:3px; }

    .contenido-row { display:flex; align-items:flex-start; gap:8px; padding:12px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--card); margin-bottom:6px; }
    .contenido-num { width:26px; height:26px; background:var(--primary); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; margin-top:2px; }
    .contenido-body  { flex:1; min-width:0; }
    .contenido-titulo{ font-size:14px; font-weight:700; }
    .contenido-desc  { font-size:12px; color:var(--text2); margin-top:3px; white-space:pre-wrap; }
    .contenido-orden { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
    .btn-ord  { background:none; border:1.5px solid var(--border); border-radius:6px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:var(--text2); transition:all .15s; padding:0; }
    .btn-ord:hover:not(:disabled) { border-color:var(--primary); color:var(--primary); background:var(--bg3); }
    .btn-ord:disabled { opacity:.25; cursor:not-allowed; }
    .plan-add-form { background:var(--bg3); border:1.5px dashed var(--border); border-radius:var(--radius); padding:16px; margin-top:10px; }
    .periodo-tag { display:inline-block; background:var(--bg3); color:var(--text2); border:1px solid var(--border); border-radius:8px; padding:2px 8px; font-size:11px; }

    /* ── CALENDARIO DE ASISTENCIA ───────────────────────────────────────────── */
    .cal-nav     { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .cal-nav-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:6px 14px; cursor:pointer; font-size:17px; color:var(--text2); transition:all .15s; }
    .cal-nav-btn:hover:not(:disabled) { border-color:var(--primary); color:var(--primary); }
    .cal-nav-btn:disabled { opacity:.3; cursor:default; }
    .cal-month-label { font-size:15px; font-weight:700; }
    .cal-summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
    .cal-sum-item { display:flex; align-items:center; gap:6px; font-size:13px; }
    .cal-sum-dot  { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
    .cal-header   { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:3px; }
    .cal-dow      { text-align:center; font-size:10px; font-weight:700; color:var(--text2); padding:3px 0; }
    .cal-grid     { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-cell {
      aspect-ratio:1; border-radius:6px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; position:relative;
      border:1.5px solid transparent; cursor:pointer; transition:all .15s;
      background:var(--bg3); -webkit-tap-highlight-color:transparent;
    }
    .cal-cell:hover:not(.cal-empty):not(.cal-weekend) { border-color:var(--primary); }
    .cal-cell.cal-selected { border-color:var(--primary) !important; box-shadow:0 0 0 2px rgba(99,102,241,.3); }
    .cal-day-num  { font-size:12px; font-weight:600; color:var(--text); }
    .cal-obs-dot  { font-size:5px; position:absolute; bottom:3px; color:var(--primary); }
    .cal-empty    { background:transparent; cursor:default; border:none; }
    .cal-weekend  { background:var(--bg3); opacity:.25; cursor:default; }
    .cal-nodata   { background:var(--bg3); opacity:.55; }
    /* Colores sólidos y vívidos — sin !important innecesario gracias al orden */
    .cal-presente { background:#22c55e; border-color:#16a34a; }
    .cal-presente .cal-day-num  { color:#fff; font-weight:800; }
    .cal-presente .cal-status   { color:rgba(255,255,255,.9); }
    .cal-ausente  { background:#ef4444; border-color:#dc2626; }
    .cal-ausente  .cal-day-num  { color:#fff; font-weight:800; }
    .cal-ausente  .cal-status   { color:rgba(255,255,255,.9); }
    .cal-tarde    { background:#f59e0b; border-color:#d97706; }
    .cal-tarde    .cal-day-num  { color:#fff; font-weight:800; }
    .cal-tarde    .cal-status   { color:rgba(255,255,255,.9); }
    .cal-status   { font-size:9px; font-weight:700; line-height:1; margin-top:1px; }
    @media (prefers-color-scheme:dark) {
      .cal-presente { background:#16a34a; border-color:#15803d; }
      .cal-ausente  { background:#dc2626; border-color:#b91c1c; }
      .cal-tarde    { background:#d97706; border-color:#b45309; }
    }
    .cal-obs-card { background:var(--bg3); border:1.5px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-top:8px; font-size:13px; line-height:1.5; }
    .cal-obs-fecha { font-weight:700; margin-bottom:4px; color:var(--text); }

    /* ── BACKUP ─────────────────────────────────────────────────────────────── */
    .backup-item { display:flex; align-items:center; gap:10px; padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--card); margin-bottom:6px; transition:border-color .15s; }
    .backup-item:hover { border-color:var(--primary-l); }
    .backup-fecha  { flex:1; min-width:0; }
    .backup-nombre { font-size:14px; font-weight:700; }
    .backup-meta   { font-size:11px; color:var(--text2); margin-top:2px; }
    .restore-warning { background:#fef2f2; border:2px solid var(--danger); border-radius:var(--radius); padding:18px; margin-bottom:16px; }
    .restore-warning strong { color:var(--danger); }

    /* ── FICHA TABS ─────────────────────────────────────────────────────────── */
    .ficha-tab-bar { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:12px; }
    .ficha-tab-btn { flex:1; padding:11px 4px; text-align:center; font-size:13px; font-weight:600;
                     color:var(--text2); border:none; background:none; cursor:pointer;
                     border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .15s; }
    .ficha-tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
    .ficha-tab-btn:hover:not(.active) { color:var(--text); background:rgba(0,0,0,.03); }

    /* ── LEGAJO TIMELINE ─────────────────────────────────────────────────────── */
    .legajo-subtitle { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase;
                       letter-spacing:.5px; margin:14px 0 8px; }
    .tl-list { margin:0; }
    .tl-entry { display:flex; gap:10px; padding-bottom:12px; position:relative; }
    .tl-entry::before { content:''; position:absolute; left:6px; top:18px; bottom:0;
                        width:2px; background:var(--border); }
    .tl-entry:last-child::before { display:none; }
    .tl-dot  { width:14px; height:14px; border-radius:50%; background:var(--primary); flex-shrink:0;
               margin-top:3px; box-shadow:0 0 0 3px var(--bg); }
    .tl-body { flex:1; min-width:0; }
    .tl-fecha { font-size:12px; font-weight:700; color:var(--primary); margin-bottom:2px; }
    .tl-desc  { font-size:14px; color:var(--text); line-height:1.5; white-space:pre-wrap; }
    .tl-meta  { font-size:11px; color:var(--text2); margin-top:3px; }
    .tl-add   { display:flex; flex-direction:column; gap:8px; padding:12px;
                background:var(--bg3); border-radius:var(--radius); margin-top:8px; }
    .tl-empty { color:var(--text2); font-size:13px; font-style:italic; padding:4px 0; }
    .legajo-save-bar { display:flex; justify-content:flex-end; padding:16px 0 0; }

    /* ── NOTIFICACIONES BELL ────────────────────────────────────────────────── */
    .notif-bell-wrap  { position:relative; margin-left:auto; }
    .notif-bell-btn   {
      background:none; border:none; cursor:pointer; font-size:20px; padding:4px 8px;
      border-radius:8px; color:var(--text); display:flex; align-items:center; position:relative;
      transition:background .18s;
    }
    .notif-bell-btn:hover { background:var(--bg3); }
    .notif-badge {
      position:absolute; top:-2px; right:-2px; background:var(--danger); color:#fff;
      border-radius:12px; font-size:10px; font-weight:800; min-width:16px; height:16px;
      display:flex; align-items:center; justify-content:center; padding:0 4px;
      border:2px solid var(--bg2); line-height:1;
    }
    .notif-panel {
      position:absolute; right:0; top:calc(100% + 8px); width:340px; max-width:90vw;
      background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius);
      box-shadow:0 8px 32px rgba(0,0,0,.18); z-index:500; overflow:hidden;
    }
    .notif-panel-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; border-bottom:1px solid var(--border);
      font-size:13px; font-weight:700;
    }
    .notif-panel-list { max-height:360px; overflow-y:auto; }
    .notif-item {
      padding:12px 16px; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background .15s;
    }
    .notif-item:last-child { border-bottom:none; }
    .notif-item:hover { background:var(--bg3); }
    .notif-item.unread { background:linear-gradient(90deg,rgba(99,102,241,.06),transparent); }
    .notif-item-header { display:flex; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .notif-dot {
      width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px;
    }
    .notif-dot-danger  { background:var(--danger); }
    .notif-dot-warning { background:var(--warning); }
    .notif-dot-success { background:var(--success); }
    .notif-dot-info    { background:var(--primary); }
    .notif-item-titulo { font-size:13px; font-weight:700; flex:1; line-height:1.3; }
    .notif-item-msg    { font-size:12px; color:var(--text2); line-height:1.4; }
    .notif-item-time   { font-size:11px; color:var(--text2); margin-top:3px; }
    .notif-empty       { padding:32px 16px; text-align:center; color:var(--text2); font-size:13px; }

    /* ── CALENDARIO ─────────────────────────────────────────────────────────── */
    .cal-wrap       { max-width:900px; margin:0 auto; }
    .cal-toolbar    {
      display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;
    }
    .cal-toolbar-month {
      font-size:18px; font-weight:800; flex:1; text-transform:capitalize;
    }
    .cal-view-toggle {
      display:flex; gap:4px;
    }
    .cal-view-btn {
      padding:7px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
      border:1.5px solid var(--border); background:var(--card); color:var(--text2); transition:all .18s;
    }
    .cal-view-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    /* ── CALENDARIO DE EVENTOS — grid flat, prefijo evtcal para no colisionar ── */
    /* Un único grid de 7 cols: primero 7 headers, luego N celdas de días */
    .evtcal-grid {
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      background:var(--card);
      border-radius:var(--radius);
      border:1.5px solid var(--border);
      overflow:hidden;
    }
    .evtcal-header {
      padding:8px 2px; text-align:center; font-size:10px; font-weight:700;
      color:var(--text2); text-transform:uppercase; letter-spacing:.03em;
      background:var(--bg); border-bottom:1.5px solid var(--border);
    }
    .evtcal-header.wknd { color:var(--primary); }

    .evtcal-cell {
      min-height:60px; padding:4px 3px;
      border-right:1px solid var(--border);
      border-bottom:1px solid var(--border);
      overflow:hidden;
    }
    .evtcal-cell:nth-child(7n) { border-right:none; }
    .evtcal-cell.other-month   { background:var(--bg); }
    .evtcal-cell.weekend:not(.other-month) { background:rgba(99,102,241,.04); }
    .evtcal-cell.today         { background:rgba(99,102,241,.06); }

    .evtcal-num {
      font-size:11px; font-weight:700;
      width:22px; height:22px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:3px; color:var(--text2);
    }
    .evtcal-cell.other-month .evtcal-num  { color:var(--border); font-weight:400; }
    .evtcal-cell.weekend:not(.other-month) .evtcal-num { color:var(--primary); }
    .evtcal-cell.today .evtcal-num        { background:var(--primary); color:#fff; font-weight:800; }

    /* Puntitos — visibles en mobile */
    .evtcal-dots { display:flex; flex-wrap:wrap; gap:3px; padding:1px 0; }
    .evtcal-dot  {
      width:7px; height:7px; border-radius:50%; cursor:pointer; flex-shrink:0;
      transition:transform .15s;
    }
    .evtcal-dot:hover    { transform:scale(1.5); }
    .evtcal-dot.inactive { opacity:.35; }

    /* Chips de texto — ocultos en mobile, visibles en desktop */
    .evtcal-chips { display:none; }
    .evtcal-chip  {
      display:block; font-size:10px; font-weight:600; border-radius:4px;
      padding:2px 5px; margin-bottom:2px; cursor:pointer; line-height:1.4;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      color:#fff; transition:opacity .15s;
    }
    .evtcal-chip:hover    { opacity:.82; }
    .evtcal-chip.inactive { opacity:.4; text-decoration:line-through; }
    .evtcal-more {
      font-size:10px; color:var(--text2); font-weight:600;
      cursor:pointer; padding:1px 4px; display:block;
    }

    @media (min-width:600px) {
      .evtcal-dots          { display:none; }
      .evtcal-chips         { display:block; }
      .evtcal-cell          { min-height:90px; padding:6px 5px; }
      .evtcal-num           { font-size:13px; width:24px; height:24px; }
      .evtcal-chip          { font-size:11px; }

function formatFechaCalendario(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function formatHora(h) { return h ? h.slice(0,5) : ''; }

function tiempoRelativo(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)   return 'ahora';
  if (mins < 60)  return `hace ${mins} min`;
  const hs = Math.floor(mins / 60);
  if (hs  < 24)  return `hace ${hs}h`;
  const ds = Math.floor(hs  / 24);
  if (ds  < 7)   return `hace ${ds}d`;
  return formatFechaCalendario(isoStr.slice(0,10));
}

async function apiFetch(url, opts = {}) {

const COLS_CSV = ['Nombre','Apellido','DNI','CUIT','Fecha de nacimiento','Dirección',
                  'Tutor','DNI del tutor','Autorización de Imagen','Autorización General',
                  'Autorización Boleto Estudiantil','Curso','Instrumento'];

function descargarPlantilla() {
  // Curso e Instrumento soportan múltiples valores separados por | (uno por inscripción)
  const ej1 = ['Juan','García','45123456','20-45123456-7','15/03/2015','Av. Siempreviva 742','María García','23456789','sí','sí','no','Delfines|Mojarritas','Guitarra|Canto'];
  const ej2 = ['Sofía','López','45678901','','22/07/2016','','','','no','no','sí','Tiburones','Batería'];
  const csv = [COLS_CSV,ej1,ej2].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = 'EPM_plantilla_importacion.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

function parseBool(v) {
  return ['si','sí','x','1','true','yes','y'].includes(String(v||'').toLowerCase().trim());
}
function parseFecha(v) {
  const s = String(v||'').trim();
  if (!s) return '';
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return /^\d{4}-\d{2}-\d{2}$/.test(s) ? s : null;
}
function parseCsvLine(line, sep=',') {
  const res=[]; let cur='', inQ=false;
  for (let i=0; i<line.length; i++) {
    const c=line[i];
    if (c==='"') { if (inQ&&line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if (c===sep&&!inQ) { res.push(cur.trim()); cur=''; }
    else cur+=c;
  }
  res.push(cur.trim()); return res;
}
function parseCsv(text) {
  // Strip BOM (both UTF-8 and UTF-16 variants), normalize line endings
  const clean = text.replace(/^﻿/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
  const lines = clean.split('\n').filter(l=>l.trim());
  if (lines.length<2) return [];
  // Auto-detect delimiter: semicolon (Excel Spanish locale) vs comma
  const firstLine = lines[0];
  const sep = firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';
  // Normalize headers to NFC so accented chars match regardless of Unicode form
  const headers = parseCsvLine(firstLine, sep).map(h => h.normalize('NFC'));
  return lines.slice(1).map(l => {
    const vals = parseCsvLine(l, sep);
    const row = {};
    headers.forEach((h,i)=>{ row[h] = vals[i]||''; });
    return row;
  });
}
function validarFilaCSV(row, cursos, instrumentos, allDnis, idx) {
  const errors=[];
  const nombre   = row['Nombre']?.trim()||'';
  const apellido = row['Apellido']?.trim()||'';
  const dni      = row['DNI']?.trim()||'';
  if (!nombre)   errors.push('Nombre requerido');
  if (!apellido) errors.push('Apellido requerido');
  if (!dni)      errors.push('DNI requerido');
  if (dni && allDnis.filter(d=>d===dni).length>1) errors.push('DNI duplicado en el archivo');
  let fecha_nacimiento='';
  if (row['Fecha de nacimiento']?.trim()) {
    const f=parseFecha(row['Fecha de nacimiento']);
    if (f===null) errors.push('Fecha inválida (usar DD/MM/AAAA o AAAA-MM-DD)');
    else fecha_nacimiento=f;
  }

  // Parsear inscripciones: columna Instrumento (opcional) emparejada con Curso
  const instrStr = row['Instrumento']?.trim()||'';
  const cursoStr = row['Curso']?.trim()||'';
  const inscripciones = [];
  let inscripcionesLabel = '';

  if (instrStr) {
    const instrNombres = instrStr.split('|').map(s=>s.trim()).filter(Boolean);
    const cursoNombres = cursoStr.split('|').map(s=>s.trim()).filter(Boolean);
    instrNombres.forEach((instrNombre, i) => {
      const cursoNombre = cursoNombres[i] || '';
      const instr = (instrumentos||[]).find(x=>x.nombre.toLowerCase()===instrNombre.toLowerCase());
      const curso = cursos.find(c=>c.nombre.toLowerCase()===cursoNombre.toLowerCase());
      if (!instr) {
        errors.push(`Instrumento "${instrNombre}" no encontrado en el sistema`);
      } else if (!cursoNombre) {
        errors.push(`Falta el nivel para instrumento "${instrNombre}"`);
      } else if (!curso) {
        errors.push(`Nivel "${cursoNombre}" no existe`);
      } else {
        inscripciones.push({ curso_id: Number(curso.id), instrumento_id: Number(instr.id),
                             curso_nombre: curso.nombre, instrumento_nombre: instr.nombre });
      }
    });
    inscripcionesLabel = inscripciones.map(i=>`${i.instrumento_nombre}→${i.curso_nombre}`).join(' | ');
  }

  return {
    idx:idx+1, ok:errors.length===0, errors,
    nombre, apellido, dni,
    cuit:         row['CUIT']?.trim()||'',
    fecha_nacimiento,
    direccion:    row['Dirección']?.trim()||'',
    tutor_nombre: row['Tutor']?.trim()||'',
    tutor_dni:    row['DNI del tutor']?.trim()||'',
    auth_imagen:  parseBool(row['Autorización de Imagen']),
    auth_general: parseBool(row['Autorización General']),
    auth_boleto:  parseBool(row['Autorización Boleto Estudiantil']),
    inscripciones, inscripcionesLabel,
  };
}

// ── RESET PASSWORD ───────────────────────────────────────────────────────────────
function ResetPasswordPage({ token, onBack }) {
  const [form,    setForm]    = useState({ password:'', confirm:'' });
  const [error,   setError]   = useState('');
  const [success, setSuccess] = useState(false);
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (form.password !== form.confirm) return setError('Las contraseñas no coinciden.');
    if (form.password.length < 6) return setError('La contraseña debe tener al menos 6 caracteres.');
    setError(''); setLoading(true);
    try {
      await apiFetch('/api/auth/reset-password', { method:'POST', body:{ token, password: form.password } });
      setSuccess(true);
      // Limpiar el token de la URL sin recargar la página
      window.history.replaceState({}, '', '/');
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <img src="/logo-epm.jpg" alt="Logo EPM" />
          <h1>EPM</h1>
          <p>Sistema de Gestión Escolar</p>
        </div>
        <h2 style={{fontSize:'17px',fontWeight:700,marginBottom:'8px',color:'var(--text)'}}>Nueva contraseña</h2>
        {success ? (
          <div style={{textAlign:'center'}}>
            <div className="login-error" style={{background:'rgba(34,197,94,.12)',borderColor:'var(--success)',color:'var(--success)',marginBottom:'20px'}}>
              ¡Contraseña actualizada! Ya podés iniciar sesión.
            </div>
            <button className="btn btn-primary" onClick={onBack}>Ir al inicio de sesión</button>
          </div>
        ) : (
          <>
            {error && <div className="login-error">{error}</div>}
            <form onSubmit={submit}>
              <div className="form-group">
                <label className="form-label">Nueva contraseña</label>
                <input className="form-control" type="password" placeholder="Mínimo 6 caracteres"
                  value={form.password} onChange={e => setForm({...form, password:e.target.value})} required />
              </div>
              <div className="form-group">
                <label className="form-label">Confirmar contraseña</label>
                <input className="form-control" type="password" placeholder="Repetí la contraseña"
                  value={form.confirm} onChange={e => setForm({...form, confirm:e.target.value})} required />
              </div>
              <button className="btn btn-primary" type="submit" disabled={loading}>
                {loading ? 'Guardando...' : 'Establecer contraseña'}
              </button>
            </form>
          </>
        )}
      </div>
    </div>
  );
}

function LoginPage({ onLogin }) {
  const [form,        setForm]        = useState({ email:'', password:'' });
  const [error,       setError]       = useState('');
  const [loading,     setLoading]     = useState(false);
  const [showForgot,  setShowForgot]  = useState(false);

  if (showForgot) return <ForgotPasswordPage onBack={() => setShowForgot(false)} />;

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const data = await apiFetch('/api/auth/login', { method:'POST', body:form });
      localStorage.setItem('epm_token', data.token);
      localStorage.setItem('epm_user',  JSON.stringify(data.user));
      onLogin(data.user);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <img src="/logo-epm.jpg" alt="Logo EPM" />

        </div>
        {error && <div className="login-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Correo electrónico</label>
            <input className="form-control" type="email" placeholder="usuario@epm.edu.ar"
              value={form.email} onChange={e => setForm({...form, email:e.target.value})} required />
          </div>
          <div className="form-group">
            <label className="form-label">Contraseña</label>
            <input className="form-control" type="password" placeholder="••••••••"
              value={form.password} onChange={e => setForm({...form, password:e.target.value})} required />

function CumpleaniosMes({ user }) {
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const hoy   = new Date();
  const [cumples,   setCumples]  = useState([]);
  const [cargando,  setCargando] = useState(true);

  useEffect(() => {
    const mes  = hoy.getMonth() + 1;
    const anio = hoy.getFullYear();
    apiFetch(`/api/cumpleanios?mes=${mes}&anio=${anio}`)
      .then(d => setCumples(d))
      .catch(() => {})
      .finally(() => setCargando(false));
  }, []);

  // Notificar cumpleaños cercanos una vez al día
  useEffect(() => {
    const key  = `epm_cumple_notif_${new Date().toISOString().slice(0,10)}`;
    if (localStorage.getItem(key)) return;
    apiFetch('/api/cumpleanios/notificar', { method:'POST' })
      .then(() => localStorage.setItem(key, '1'))
      .catch(() => {});
  }, []);

  if (cargando || cumples.length === 0) return null;

  const hoyDia = hoy.getDate();
  const cumpleHoy   = cumples.filter(c => c.dia === hoyDia);
  const cumpleProx  = cumples.filter(c => c.dia > hoyDia && c.dia <= hoyDia + 7);
  const cumpleResto = cumples.filter(c => c.dia < hoyDia || c.dia > hoyDia + 7);

  return (
    <div className="card" style={{marginBottom:16,borderColor:'#ec489920',background:'linear-gradient(135deg,#fff,#fdf2f8)'}}>
      <div className="card-title" style={{marginBottom:8}}>
        🎂 Cumpleaños de {MESES[hoy.getMonth()]}
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--text2)'}}>
          {cumples.length} {cumples.length === 1 ? 'cumpleaños' : 'cumpleaños'}
        </span>
      </div>
      {cumpleHoy.map((c, i) => (
        <div key={i} className="cumple-card" style={{background:'#fce7f3',borderRadius:10,marginBottom:4}}>
          <span style={{fontSize:20}}>🎂</span>
          <div>
            <div className="cumple-nombre">{c.nombre} — ¡HOY!</div>
            <div className="cumple-tipo">{c.tipo === 'docente' ? '👩‍🏫 Docente' : '👦 Estudiante'}</div>
          </div>
        </div>
      ))}
      {cumpleProx.map((c, i) => (
        <div key={i} className="cumple-card">
          <span className="cumple-dot" style={{marginTop:4}} />
          <div>
            <div className="cumple-nombre">{c.nombre}</div>
            <div className="cumple-tipo">{c.tipo === 'docente' ? '👩‍🏫 Docente' : '👦 Estudiante'} · {c.dia}/{hoy.getMonth()+1}</div>
          </div>
        </div>
      ))}
      {cumpleResto.length > 0 && (
        <div style={{fontSize:12,color:'var(--text2)',padding:'4px 12px'}}>
          + {cumpleResto.length} más este mes
        </div>
      )}
    </div>
  );
}
