// ── INVENTARIO ───────────────────────────────────────────────────────────────────
const INV_ESTADOS = { disponible:'Disponible', en_uso:'En uso', en_reparacion:'En reparación', baja:'Baja' };

function Inventario({ user }) {
  const puede = (p) => user.permisos?.includes(p);
  const [lista,       setLista]       = useState([]);
  const [instrumentos,setInstrumentos]= useState([]);
  const [filtroTipo,  setFiltroTipo]  = useState('');
  const [filtroEst,   setFiltroEst]   = useState('');
  const [busqueda,    setBusqueda]    = useState('');
  const [cargando,    setCargando]    = useState(true);
  const [modal,       setModal]       = useState(null); // null | 'nuevo' | item
  const [error,       setError]       = useState('');

  const cargar = useCallback(async () => {
    setCargando(true);
    try {
      const [inv, inst] = await Promise.all([
        apiFetch('/api/inventario'),
        apiFetch('/api/instrumentos'),
      ]);
      setLista(inv); setInstrumentos(inst);
    } catch(e) { setError(e.message); }
    finally { setCargando(false); }
  }, []);
  useEffect(() => { cargar(); }, [cargar]);

  const listaFiltrada = lista.filter(it => {
    if (filtroTipo && String(it.instrumento_id) !== filtroTipo) return false;
    if (filtroEst  && it.estado !== filtroEst) return false;
    if (busqueda   && !`${it.nombre} ${it.tipo_instrumento_nombre||''}`.toLowerCase().includes(busqueda.toLowerCase())) return false;
    return true;
  });

  const exportarCSV = () => {
    const cols = ['Nombre','Tipo','Estado','Número de serie','Asignado a','Observaciones','Fecha de alta'];
    const rows = listaFiltrada.map(it => [
      it.nombre, it.tipo_instrumento_nombre||'', INV_ESTADOS[it.estado]||it.estado,
      it.numero_serie||'', it.asignado_nombre||'', it.observaciones||'',
      it.fecha_alta||'',
    ]);
    const csv = [cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download = 'EPM_inventario.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  return (
    <div>
      <div className="section-header">
        <h2 style={{fontSize:18,fontWeight:800}}>🎻 Inventario de instrumentos</h2>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-secondary btn-auto" style={{fontSize:12}} onClick={exportarCSV}>⬇ CSV</button>
          {puede('editar_inventario') && (
            <button className="btn btn-primary btn-auto" onClick={() => setModal('nuevo')}>+ Agregar</button>
          )}
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <input className="form-control" style={{flex:1,minWidth:140}}
          placeholder="Buscar..." value={busqueda} onChange={e => setBusqueda(e.target.value)} />
        <select className="form-control" style={{width:'auto'}} value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)}>
          <option value="">Todos los tipos</option>
          {instrumentos.map(i=><option key={i.id} value={i.id}>{i.nombre}</option>)}
        </select>
        <select className="form-control" style={{width:'auto'}} value={filtroEst} onChange={e=>setFiltroEst(e.target.value)}>
          <option value="">Todos los estados</option>
          {Object.entries(INV_ESTADOS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
      </div>
      {error && <div className="alert alert-error">{error}</div>}
      {cargando ? <div className="spinner"><div className="spin"/></div>
        : listaFiltrada.length === 0
        ? <div className="empty-state"><div className="empty-state-icon">🎻</div><div>Sin ítems en el inventario</div></div>
        : listaFiltrada.map(it => (
            <div key={it.id} className="list-row" style={{cursor: puede('editar_inventario') ? 'pointer' : 'default'}}
              onClick={() => puede('editar_inventario') && setModal(it)}>
              <div style={{flex:1,minWidth:0}}>
                <div className="list-row-label">{it.nombre}</div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:2,display:'flex',flexWrap:'wrap',gap:8}}>
                  {it.tipo_instrumento_nombre && <span>{it.tipo_instrumento_nombre}</span>}
                  {it.numero_serie && <span>N/S: {it.numero_serie}</span>}
                  {it.asignado_nombre && <span>📎 {it.asignado_nombre}</span>}
                </div>
              </div>
              <span className={`inv-badge inv-estado-${it.estado}`}>{INV_ESTADOS[it.estado]||it.estado}</span>
            </div>
          ))
      }
      {modal !== null && (
        <ModalInventario item={modal === 'nuevo' ? null : modal}
          instrumentos={instrumentos}
          onClose={() => setModal(null)}
          onGuardado={() => { setModal(null); cargar(); }}
        />
      )}
    </div>
  );
}

function ModalInventario({ item, instrumentos, onClose, onGuardado }) {
  const [form, setForm] = useState({
    nombre:        item?.nombre || '',
    instrumento_id: item?.instrumento_id || '',
    estado:        item?.estado || 'disponible',
    numero_serie:  item?.numero_serie || '',
    observaciones: item?.observaciones || '',
    fecha_alta:    item?.fecha_alta || new Date().toISOString().slice(0,10),
  });
  const [saving, setSaving] = useState(false);
  const [error,  setError]  = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async (e) => {
    e.preventDefault(); setSaving(true); setError('');
    try {
      const method = item?.id ? 'PUT' : 'POST';
      const url    = item?.id ? `/api/inventario/${item.id}` : '/api/inventario';
      await apiFetch(url, { method, body: form });
      onGuardado();
    } catch(err) { setError(err.message); }
    finally { setSaving(false); }
  };

  const eliminar = async () => {
    if (!confirm('¿Eliminar este ítem del inventario?')) return;
    try { await apiFetch(`/api/inventario/${item.id}`, { method:'DELETE' }); onGuardado(); }
    catch(err) { setError(err.message); }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{item?.id ? 'Editar ítem' : 'Nuevo ítem de inventario'}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        {error && <div className="alert alert-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Nombre / descripción *</label>
            <input className="form-control" value={form.nombre} onChange={e=>set('nombre',e.target.value)} required
              placeholder='Ej: "Guitarra criolla Gracia Nº3"' />
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Tipo de instrumento</label>
              <select className="form-control" value={form.instrumento_id} onChange={e=>set('instrumento_id',e.target.value||null)}>
                <option value="">— Sin tipo —</option>
                {instrumentos.map(i=><option key={i.id} value={i.id}>{i.nombre}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Estado</label>
              <select className="form-control" value={form.estado} onChange={e=>set('estado',e.target.value)}>
                {Object.entries(INV_ESTADOS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Número de serie</label>
              <input className="form-control" value={form.numero_serie} onChange={e=>set('numero_serie',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Fecha de alta</label>
              <input className="form-control" type="date" value={form.fecha_alta} onChange={e=>set('fecha_alta',e.target.value)} />
            </div>
            <div className="form-group col-full">
              <label className="form-label">Observaciones</label>
              <textarea className="form-control" rows={2} value={form.observaciones} onChange={e=>set('observaciones',e.target.value)} />
            </div>
          </div>
          <div className="modal-footer">
            {item?.id && <button type="button" className="btn btn-danger btn-auto" onClick={eliminar}>🗑</button>}
            <button type="button" className="btn btn-secondary btn-auto" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn-primary btn-auto" disabled={saving}>
              {saving ? 'Guardando...' : 'Guardar'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── PROYECTOS ────────────────────────────────────────────────────────────────────
const PROY_ESTADOS = {
  borrador:'Borrador', en_curso:'En curso', presentado:'Presentado',
  aprobado:'Aprobado', rechazado:'Rechazado', finalizado:'Finalizado',
};
const PROY_ICONOS = {
  borrador:'✏️', en_curso:'🔄', presentado:'📤', aprobado:'✅', rechazado:'❌', finalizado:'🏁',
};

function Proyectos({ user }) {
  const puede = (p) => user.permisos?.includes(p);
  const [lista,    setLista]   = useState([]);
  const [filtroEst,setFiltroEst] = useState('');
  const [cargando, setCargando] = useState(true);
  const [detalleId,setDetalleId] = useState(null);
  const [modalNuevo,setModalNuevo] = useState(false);

  const cargar = useCallback(async () => {
    setCargando(true);
    try {
      const url = filtroEst ? `/api/proyectos?estado=${filtroEst}` : '/api/proyectos';
      setLista(await apiFetch(url));
    } catch(e) {}
    finally { setCargando(false); }
  }, [filtroEst]);
  useEffect(() => { cargar(); }, [cargar]);

  if (detalleId) return <DetalleProy proyId={detalleId} user={user} puede={puede}
    onVolver={() => { setDetalleId(null); cargar(); }} />;

  return (
    <div>
      <div className="section-header">
        <h2 style={{fontSize:18,fontWeight:800}}>📁 Proyectos</h2>
        {puede('editar_proyectos') && (
          <button className="btn btn-primary btn-auto" onClick={() => setModalNuevo(true)}>+ Nuevo proyecto</button>
        )}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:14,overflowX:'auto'}}>
        {[['','Todos'],['borrador','Borrador'],['en_curso','En curso'],
          ['presentado','Presentado'],['aprobado','Aprobado'],
          ['rechazado','Rechazado'],['finalizado','Finalizado']].map(([k,v]) => (
          <button key={k} className={`curso-tab ${filtroEst===k?'active':''}`} onClick={()=>setFiltroEst(k)}>{v}</button>
        ))}
      </div>
      {cargando ? <div className="spinner"><div className="spin"/></div>
        : lista.length === 0
        ? <div className="empty-state"><div className="empty-state-icon">📁</div><div>No hay proyectos</div></div>
        : lista.map(p => (
            <div key={p.id} className="proy-card" onClick={() => setDetalleId(p.id)}>
              <div className="proy-card-titulo">{PROY_ICONOS[p.estado]} {p.titulo}</div>
              <div className="proy-card-meta">
                <span className={`proy-badge proy-estado-${p.estado}`}>{PROY_ESTADOS[p.estado]}</span>
                {p.destino && <span>📍 {p.destino}</span>}
                {p.fecha_presentacion && <span>📅 {formatFechaCalendario(p.fecha_presentacion)}</span>}
                <span style={{marginLeft:'auto',color:'var(--text2)'}}>{p.creado_por_nombre}</span>
              </div>
            </div>
          ))
      }
      {modalNuevo && (
        <ModalProy onClose={() => setModalNuevo(false)}
          onGuardado={(p) => { setModalNuevo(false); setDetalleId(p.id); }} />
      )}
    </div>
  );
}

function ModalProy({ proyecto, onClose, onGuardado }) {
  const [form, setForm] = useState({
    titulo:             proyecto?.titulo || '',
    descripcion:        proyecto?.descripcion || '',
    estado:             proyecto?.estado || 'borrador',
    fecha_presentacion: proyecto?.fecha_presentacion || '',
    destino:            proyecto?.destino || '',
  });
  const [saving, setSaving] = useState(false);
  const [error,  setError]  = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async (e) => {
    e.preventDefault(); setSaving(true); setError('');
    try {
      const method = proyecto?.id ? 'PUT' : 'POST';
      const url    = proyecto?.id ? `/api/proyectos/${proyecto.id}` : '/api/proyectos';
      const data   = await apiFetch(url, { method, body: form });
      onGuardado(data);
    } catch(err) { setError(err.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <span className="modal-title">{proyecto?.id ? 'Editar proyecto' : 'Nuevo proyecto'}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        {error && <div className="alert alert-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Título *</label>
            <input className="form-control" value={form.titulo} onChange={e=>set('titulo',e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Descripción</label>
            <textarea className="form-control" rows={4} value={form.descripcion} onChange={e=>set('descripcion',e.target.value)}
              placeholder="Descripción detallada del proyecto..." />
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Estado</label>
              <select className="form-control" value={form.estado} onChange={e=>set('estado',e.target.value)}>
                {Object.entries(PROY_ESTADOS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha de presentación</label>
              <input className="form-control" type="date" value={form.fecha_presentacion} onChange={e=>set('fecha_presentacion',e.target.value)} />
            </div>
            <div className="form-group col-full">
              <label className="form-label">Destino de presentación</label>
              <input className="form-control" value={form.destino} onChange={e=>set('destino',e.target.value)}
                placeholder="Ej: Municipalidad de San Martín, Ministerio de Cultura..." />
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-secondary btn-auto" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn-primary btn-auto" disabled={saving}>
              {saving ? 'Guardando...' : proyecto?.id ? 'Guardar cambios' : 'Crear proyecto'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function DetalleProy({ proyId, user, puede, onVolver }) {
  const [proy,    setProy]    = useState(null);
  const [cargando,setCargando]= useState(true);
  const [editando,setEditando]= useState(false);
  const [subiendo,setSubiendo]= useState(false);
  const [error,   setError]   = useState('');

  const cargar = useCallback(async () => {
    try { setProy(await apiFetch(`/api/proyectos/${proyId}`)); }
    catch(e) { setError(e.message); }
    finally { setCargando(false); }
  }, [proyId]);
  useEffect(() => { cargar(); }, [cargar]);

  const subirAdjunto = async (file) => {
    if (!file) return; setSubiendo(true);
    try {
      const fd = new FormData(); fd.append('archivo', file);
      const token = localStorage.getItem('epm_token');
      const res = await fetch(`/api/proyectos/${proyId}/adjuntos`, {
        method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:fd,
      });
      if (!res.ok) throw new Error((await res.json()).error);
      cargar();
    } catch(e) { alert(e.message); }
    finally { setSubiendo(false); }
  };

  const eliminarAdjunto = async (adjId) => {
    if (!confirm('¿Eliminar adjunto?')) return;
    try { await apiFetch(`/api/proyectos/${proyId}/adjuntos/${adjId}`, { method:'DELETE' }); cargar(); }
    catch(e) { alert(e.message); }
  };

  if (cargando) return <div className="spinner"><div className="spin"/></div>;
  if (!proy)    return <div className="alert alert-error">{error || 'Proyecto no encontrado'}</div>;

  return (
    <div style={{maxWidth:720,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
        <button className="btn btn-secondary btn-auto" onClick={onVolver}>← Volver</button>
        <h2 style={{fontSize:18,fontWeight:800,flex:1}}>{proy.titulo}</h2>
        {puede('editar_proyectos') && (
          <button className="btn btn-secondary btn-auto" onClick={() => setEditando(true)}>✏️ Editar</button>
        )}
      </div>
      <div className="ficha-section">
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          <span className={`proy-badge proy-estado-${proy.estado}`}>{PROY_ICONOS[proy.estado]} {PROY_ESTADOS[proy.estado]}</span>
          {proy.fecha_presentacion && <span style={{fontSize:13,color:'var(--text2)'}}>📅 {formatFechaCalendario(proy.fecha_presentacion)}</span>}
          {proy.destino && <span style={{fontSize:13,color:'var(--text2)'}}>📍 {proy.destino}</span>}
        </div>
        {proy.descripcion && <p style={{fontSize:14,lineHeight:1.7,color:'var(--text)',whiteSpace:'pre-wrap'}}>{proy.descripcion}</p>}
      </div>

      {/* Adjuntos */}
      <div className="ficha-section">
        <div className="ficha-section-title" style={{justifyContent:'space-between'}}>
          📎 Archivos adjuntos
          {puede('editar_proyectos') && (
            <label style={{cursor:'pointer',color:'var(--primary)',fontSize:12,fontWeight:700}}>
              {subiendo ? 'Subiendo...' : '+ Subir archivo'}
              <input type="file" style={{display:'none'}} accept=".pdf,.doc,.docx,.odt,.jpg,.png"
                onChange={e => e.target.files[0] && subirAdjunto(e.target.files[0])} />
            </label>
          )}
        </div>
        {proy.adjuntos?.length === 0
          ? <div style={{color:'var(--text2)',fontSize:13}}>Sin archivos adjuntos</div>
          : proy.adjuntos?.map(adj => (
              <div key={adj.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:18}}>{adj.mime_type?.includes('pdf') ? '📄' : adj.mime_type?.startsWith('image') ? '🖼' : '📝'}</span>
                <a href={adj.path} target="_blank" style={{flex:1,fontSize:13,color:'var(--primary)',fontWeight:600}}>{adj.nombre}</a>
                {puede('editar_proyectos') && (
                  <button className="btn-icon btn-icon-danger" onClick={() => eliminarAdjunto(adj.id)}>🗑</button>
                )}
              </div>
            ))
        }
      </div>

      {/* Historial */}
      <div className="ficha-section">
        <div className="ficha-section-title">🕐 Historial de estados</div>
        {proy.historial?.map((h, i) => (
          <div key={i} className="tl-item">
            <div className="tl-dot" style={{background: h.estado === 'aprobado' ? 'var(--success)' : h.estado === 'rechazado' ? 'var(--danger)' : 'var(--primary)'}} />
            <div className="tl-body">
              <div className="tl-header">
                <span className={`proy-badge proy-estado-${h.estado}`}>{PROY_ESTADOS[h.estado] || h.estado}</span>
                <span className="tl-fecha">{h.created_at.slice(0,10)}</span>
              </div>
              {h.nota && <div className="tl-desc">{h.nota}</div>}
            </div>
          </div>
        ))}
      </div>

      {editando && (
        <ModalProy proyecto={proy} onClose={() => setEditando(false)}
          onGuardado={() => { setEditando(false); cargar(); }} />
      )}
    </div>
  );
}

  );
}

// ── LAYOUT ──────────────────────────────────────────────────────────────────────
function Layout({ user }) {
  const [section, setSection] = useState('dashboard');
  const [menuOpen, setMenuOpen] = useState(false);
  const title = NAV.find(n => n.id === section)?.label || 'Dashboard';

  return (
    <div className="layout">
      <Sidebar
        user={user} section={section}
        onSection={setSection}
        open={menuOpen} onClose={() => setMenuOpen(false)}
      />
      <div className="main">
        <div className="topbar">
          <button className="topbar-menu" onClick={() => setMenuOpen(o => !o)}>☰</button>
          <span className="topbar-title">{title}</span>
          <NotificacionesBell user={user} />
        </div>
        <div className="page">
          {section === 'dashboard'
            ? <Dashboard user={user} onSection={setSection} />
            : section === 'estudiantes'
            ? <Estudiantes user={user} />
            : section === 'asistencia'
            ? <AsistenciasView user={user} />
            : section === 'reportes'
            ? <Reportes user={user} />
            : section === 'usuarios'
            ? <UsuariosYRoles user={user} />
            : section === 'planificaciones'
            ? <Planificaciones user={user} />
            : section === 'backup'
            ? <Backup />
            : section === 'cursos'
            ? <Cursos user={user} />
            : section === 'instrumentos'
            ? <Instrumentos user={user} />
            : section === 'calendario'
            ? <Calendario user={user} />
            : section === 'docentes'
            ? <Docentes user={user} />
            : section === 'inventario'
            ? <Inventario user={user} />
            : section === 'proyectos'
            ? <Proyectos user={user} />
            : section === 'finanzas'
            ? <Finanzas />
            : <Placeholder id={section} />}
        </div>
      </div>
    </div>
  );
}

// ── APP ─────────────────────────────────────────────────────────────────────────
function App() {
  const [user,        setUser]       = useState(null);
  const [loading,     setLoading]    = useState(true);
  const [resetToken,  setResetToken] = useState(() => {
    const p = new URLSearchParams(window.location.search);
    return p.get('token') || null;
  });
  const [inviteToken, setInviteToken] = useState(() => {
    const p = new URLSearchParams(window.location.search);
    return p.get('invite') || null;
  });

  useEffect(() => {
    if (resetToken || inviteToken) { setLoading(false); return; }
    if (!getUser()) { setLoading(false); return; }
    apiFetch('/api/auth/me')
      .then(d => {
        // Reemplaza token y usuario con datos frescos de la DB.
        // Resuelve tokens viejos que no tengan todos los campos (ej: institucion_id, permisos).
        if (d.token) localStorage.setItem('epm_token', d.token);
        localStorage.setItem('epm_user', JSON.stringify(d.user));
        setUser(d.user);
      })
      .catch(() => {
        localStorage.removeItem('epm_token');
        localStorage.removeItem('epm_user');
      })
      .finally(() => setLoading(false));
  }, []);

  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
                 background:'linear-gradient(135deg,#1e1b4b,#312e81)'}}>
      <div className="spinner">
        <div className="spin" style={{borderColor:'rgba(255,255,255,.3)',borderTopColor:'#a5b4fc'}} />
      </div>
    </div>
  );

  if (inviteToken) return <InvitacionPage token={inviteToken} onDone={() => { setInviteToken(null); window.history.replaceState({}, '', '/'); }} />;
  if (resetToken)  return <ResetPasswordPage token={resetToken} onBack={() => { setResetToken(null); window.history.replaceState({}, '', '/'); }} />;

  return user ? <Layout user={user} /> : <LoginPage onLogin={setUser} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
